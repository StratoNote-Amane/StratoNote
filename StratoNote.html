<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,minimum-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="StratoNote">
<meta name="theme-color" content="#76c0ea">
<link rel="apple-touch-icon" id="pwa-icon" href="">
<script id="pwa-icon-gen">
(function(){
  var c=document.createElement('canvas');
  var S=180;c.width=S;c.height=S;
  var ctx=c.getContext('2d');
  var cx=90,cy=90;

  // Background
  var r=36;
  ctx.fillStyle='#0a1628';
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(S-r,0);ctx.arcTo(S,0,S,r,r);
  ctx.lineTo(S,S-r);ctx.arcTo(S,S,S-r,S,r);
  ctx.lineTo(r,S);ctx.arcTo(0,S,0,S-r,r);
  ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);
  ctx.closePath();ctx.fill();

  // Orbit rings (3 concentric, dim)
  [62,44,26].forEach(function(rad){
    ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1.5;ctx.stroke();
  });

  // Progress arcs (clockwise from top, brightest=outer)
  ctx.lineCap='round';
  var arcs=[
    {r:62, start:-Math.PI/2, end:Math.PI/3,  alpha:1.0,  w:3.5},
    {r:44, start:-Math.PI/2, end:Math.PI/2,  alpha:0.60, w:3.0},
    {r:26, start:-Math.PI/2, end:Math.PI/4,  alpha:0.35, w:2.5},
  ];
  arcs.forEach(function(a){
    ctx.beginPath();ctx.arc(cx,cy,a.r,a.start,a.end);
    ctx.strokeStyle='rgba(118,192,234,'+a.alpha+')';
    ctx.lineWidth=a.w;ctx.stroke();
  });

  // Apex dot (top of outer ring = current goal)
  ctx.beginPath();ctx.arc(cx,cy-62,5,0,Math.PI*2);
  ctx.fillStyle='#ffffff';ctx.fill();

  // Cross flare on apex
  [[0,-8,0,-4],[0,4,0,8],[-8,0,-4,0],[4,0,8,0]].forEach(function(p){
    ctx.beginPath();ctx.moveTo(cx+p[0],cy-62+p[1]);ctx.lineTo(cx+p[2],cy-62+p[3]);
    ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=1.8;ctx.stroke();
  });

  // Core circle
  ctx.beginPath();ctx.arc(cx,cy,16,0,Math.PI*2);
  ctx.fillStyle='#0a1628';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,16,0,Math.PI*2);
  ctx.strokeStyle='rgba(118,192,234,0.7)';ctx.lineWidth=2;ctx.stroke();

  // Up arrow in core
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2.8;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(cx,cy+8);ctx.lineTo(cx,cy-6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-6,cy-1);ctx.lineTo(cx,cy-8);ctx.lineTo(cx+6,cy-1);ctx.stroke();

  // Publish
  var png=c.toDataURL('image/png');
  var lnk=document.getElementById('pwa-icon');if(lnk)lnk.href=png;
  ['57','72','76','114','120','144','152','180'].forEach(function(sz){
    var l=document.createElement('link');l.rel='apple-touch-icon';
    l.setAttribute('sizes',sz+'x'+sz);l.href=png;document.head.appendChild(l);
  });
})();
</script>
<title>💫 StratoNote</title>
<style>
:root{
  --ac:#76c0ea;--ac2:#4aa8d8;--ac3:#99d8ff;--acbg:#eef7fd;--acbr:#c4e4f5;
  --bg:#f4f9fd;--card:#fff;--t1:#1c2a36;--t2:#4a6478;--t3:#8aa4b4;
  --br:#cfe6f4;--ok:#3aaa72;--warn:#e09030;--bad:#d84848;
  --r:14px;--rs:10px;
  --sh:0 2px 12px rgba(76,168,216,.12);--sh2:0 6px 28px rgba(76,168,216,.18);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif;}
body{background:var(--bg);color:var(--t1);}
#bgimg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;display:none;}
#bgimg::after{content:'';position:absolute;inset:0;background:rgba(244,249,253,.86);}
#app{position:relative;z-index:1;display:flex;height:100%;padding-top:var(--st);}
#sb{width:216px;min-width:216px;background:var(--card);border-right:1px solid var(--br);display:flex;flex-direction:column;box-shadow:var(--sh);z-index:20;flex-shrink:0;}
.sbh{padding:18px 16px 13px;background:linear-gradient(150deg,var(--ac2),var(--ac));color:#fff;position:relative;overflow:hidden;}
.sbh::after{content:'✦';position:absolute;right:10px;bottom:6px;font-size:48px;opacity:.12;}
.sbn{font-size:17px;font-weight:800;}.sbs{font-size:10px;opacity:.75;margin-top:2px;}
.sbtm{padding:7px 14px;background:var(--acbg);border-bottom:1px solid var(--br);font-size:11px;color:var(--t2);text-align:center;}
.sbtm b{font-size:15px;color:var(--ac2);display:block;font-variant-numeric:tabular-nums;}
.sbnav{flex:1;overflow-y:auto;padding:5px 0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);border-left:3px solid transparent;transition:.15s;user-select:none;}
.ni:hover{background:var(--acbg);color:var(--ac2);}.ni.on{background:var(--acbg);color:var(--ac2);border-left-color:var(--ac);font-weight:700;}
.ni-ic{width:20px;text-align:center;font-size:14px;flex-shrink:0;}
.sbft{padding:9px 14px;border-top:1px solid var(--br);font-size:11px;color:var(--t3);}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#desk-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px 24px;}
#mob-hd{display:none;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--br);align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh);}
#mob-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--br);z-index:100;padding-bottom:var(--sb);box-shadow:0 -2px 10px rgba(76,168,216,.1);}
.mtrow{display:flex;}.mtab{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 2px 4px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--t3);font-size:9px;font-weight:500;gap:2px;transition:.15s;min-width:0;}
.mtab.on{color:var(--ac2);}.mtic{font-size:18px;line-height:1;}
#mob-ct{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(62px + var(--sb));}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--br);padding:16px;box-shadow:var(--sh);margin-bottom:14px;}
.ct{font-size:10px;font-weight:700;color:var(--ac2);letter-spacing:.7px;text-transform:uppercase;margin-bottom:10px;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.pt{font-size:20px;font-weight:800;}.ps{font-size:11px;color:var(--t3);margin-top:2px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;-webkit-appearance:none;}
.bp{background:var(--ac);color:#fff;}.bp:active{background:var(--ac2);}
.bs{background:var(--acbg);color:var(--ac2);border:1px solid var(--acbr);}
.bd{background:#fdf0f0;color:var(--bad);}
.sm{padding:5px 11px;font-size:12px;border-radius:8px;}.ic{padding:6px;}
input,select,textarea{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--br);background:var(--bg);font-size:14px;color:var(--t1);font-family:inherit;outline:none;transition:.15s;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--ac);background:#fff;}
label{font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;}
.fg{margin-bottom:12px;}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.ba{background:var(--acbg);color:var(--ac2);}.bok{background:#e8f7f0;color:var(--ok);}.bwn{background:#fef5e8;color:var(--warn);}.bbd{background:#fdf0f0;color:var(--bad);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.sc{background:var(--card);border-radius:var(--rs);border:1px solid var(--br);padding:12px;text-align:center;}
.sv{font-size:22px;font-weight:800;color:var(--ac2);}.sl{font-size:10px;color:var(--t3);margin-top:2px;}
/* BADGE SYSTEM */
.badge-icon{font-size:28px;display:block;margin-bottom:4px;}
.badge-card{background:var(--card);border:1.5px solid var(--br);border-radius:12px;padding:12px 10px;text-align:center;box-shadow:var(--sh);}
.badge-card.earned{border-color:var(--ac);background:var(--acbg);}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-end;justify-content:center;}
.mov.on{display:flex;}
.modal{background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:20px 18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + var(--sb));box-shadow:var(--sh2);border-top:2px solid var(--ac);animation:mup .2s ease;}
@keyframes mup{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.mt{font-size:16px;font-weight:800;margin-bottom:16px;}.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
@media(min-width:600px){.mov{align-items:center;}.modal{border-radius:var(--r);max-width:460px;}}
#toast{position:fixed;bottom:calc(70px + var(--sb));left:50%;transform:translateX(-50%) translateY(8px);background:rgba(28,42,54,.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:.25s;z-index:2000;white-space:nowrap;pointer-events:none;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:681px){#toast{bottom:24px;}}
/* CALENDAR */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cdh{text-align:center;font-size:10px;font-weight:600;color:var(--t3);padding:3px 0;}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3px 1px;border-radius:7px;cursor:pointer;font-size:11.5px;transition:.12s;border:1.5px solid transparent;color:var(--t2);}
.cd:hover{background:var(--acbg);}.cd.today{background:var(--ac);color:#fff;font-weight:800;}.cd.sel{border-color:var(--ac);background:var(--acbg);}.cd.om{opacity:.3;}
.cdts{display:flex;gap:2px;margin-top:1px;}.dot{width:4px;height:4px;border-radius:50%;background:var(--ac);}.dot.h{background:var(--bad);}.dot.m{background:var(--warn);}
.ev{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);background:var(--acbg);border:1px solid var(--br);margin-bottom:6px;}
.ev-bar{width:4px;min-height:36px;border-radius:2px;flex-shrink:0;}
.lb{height:8px;border-radius:4px;background:var(--br);overflow:hidden;margin-top:4px;}
.lbf{height:100%;border-radius:4px;transition:.4s;min-width:4px;}
.tbars{display:flex;gap:4px;align-items:flex-end;height:52px;}
.tbar{flex:1;border-radius:3px 3px 0 0;min-height:5px;}
.tlbls{display:flex;gap:4px;margin-top:4px;}
.tlbl{flex:1;text-align:center;font-size:9px;color:var(--t3);}
/* TIMER */
.tdisp{font-size:72px;font-weight:800;letter-spacing:-3px;font-variant-numeric:tabular-nums;text-align:center;line-height:1;transition:color .3s;color:var(--t1);}
.tdisp.run{color:var(--ac2);}.tdisp.pau{color:var(--warn);}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 12px;border-radius:18px;border:1.5px solid var(--br);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--t2);transition:.12s;}
.chip.on{border-color:var(--ac);background:var(--acbg);color:var(--ac2);}
/* FLASHCARDS */
.fcw{perspective:1000px;max-width:420px;margin:0 auto 16px;}
.fcc{width:100%;aspect-ratio:16/9;position:relative;transform-style:preserve-3d;transition:.45s cubic-bezier(.4,0,.2,1);cursor:pointer;border-radius:var(--r);}
.fcc.flip{transform:rotateY(180deg);}
.fcf{position:absolute;inset:0;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:var(--sh2);}
.fcf-fr{background:linear-gradient(135deg,var(--ac2),var(--ac3));color:#fff;}
.fcf-bk{background:var(--card);transform:rotateY(180deg);border:1px solid var(--br);}
.fclbl{font-size:9px;font-weight:700;opacity:.7;margin-bottom:8px;letter-spacing:1.5px;}
.fctxt{font-size:clamp(14px,4vw,20px);font-weight:700;text-align:center;line-height:1.5;}
.fcprog{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--t2);}
.fcpb{flex:1;height:5px;background:var(--br);border-radius:3px;overflow:hidden;}.fcpf{height:100%;background:var(--ac);transition:.3s;}
.fcbtns{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;}
.fb{padding:10px 18px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.fbok{background:#e8f7f0;color:var(--ok);border:1.5px solid #b0e8cc;}
.fbng{background:#fdf0f0;color:var(--bad);border:1.5px solid #f4c0c0;}
.fbsk{background:var(--acbg);color:var(--t2);border:1.5px solid var(--acbr);}
.dki{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:var(--rs);background:var(--acbg);border:1px solid var(--br);margin-bottom:7px;cursor:pointer;}
/* FC inline add */
.fc-add-bar{background:var(--card);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:12px;}
/* SKILL TREE - NEW SUBJECT SELECT + FULLSCREEN MAP */
.sk-subj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;}
.sk-subj-card{background:var(--card);border-radius:var(--r);border:2px solid var(--br);padding:16px 14px;cursor:pointer;transition:.15s;text-align:center;position:relative;overflow:hidden;}
.sk-subj-card:active{transform:scale(0.97);}
.sk-subj-card.has-skills{border-color:var(--ac);}
.sk-subj-name{font-size:14px;font-weight:800;margin-bottom:4px;}
.sk-subj-count{font-size:11px;color:var(--t3);}
.sk-subj-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 2px 2px 0;transition:.4s;}
/* Fullscreen skill map overlay */
#sk-map-overlay{display:none;position:fixed;inset:0;z-index:500;background:var(--bg);flex-direction:column;}
#sk-map-overlay.on{display:flex;}
#sk-map-hd{background:var(--card);border-bottom:1px solid var(--br);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:calc(10px + var(--st));}
#sk-map-title{font-size:16px;font-weight:800;}
#sk-map-body{flex:1;overflow:hidden;padding:14px;padding-bottom:calc(14px + var(--sb));position:relative;cursor:grab;user-select:none;}
#sk-map-body.panning{cursor:grabbing;}
/* SVG wrap は絶対配置でパン時に translate する */
#sk-map-svg-wrap{display:inline-block;min-width:100%;position:absolute;top:0;left:0;}
.sk-add-form{display:none;background:var(--acbg);border:1.5px solid var(--ac);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.sk-add-form.on{display:block;}
/* TEST */
.ttabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ttab{padding:6px 12px;border-radius:18px;border:1.5px solid var(--br);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--t2);}
.ttab.on{border-color:var(--ac);background:var(--acbg);color:var(--ac2);}
.trnd{border-radius:var(--rs);border:1px solid var(--br);margin-bottom:10px;overflow:hidden;}
.trnd-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--acbg);cursor:pointer;gap:8px;}
.trnd-n{font-size:13px;font-weight:700;flex:1;}.trnd-b{padding:14px;display:none;}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.srow-lbl{font-size:12px;font-weight:600;color:var(--t2);width:64px;flex-shrink:0;}
.srow-bw{flex:1;height:14px;background:var(--br);border-radius:7px;overflow:hidden;}
.srow-bf{height:100%;border-radius:7px;transition:.4s;}
.srow-v{font-size:11px;font-weight:700;width:52px;text-align:right;flex-shrink:0;}
/* SETTINGS */
.sect{font-size:10px;font-weight:700;color:var(--ac2);letter-spacing:.8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--br);}
.subr{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--br);font-size:13px;}
.subr:last-child{border-bottom:none;}
#offbdg{display:none;position:fixed;top:calc(8px + var(--st));right:8px;z-index:9999;background:var(--warn);color:#fff;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;}
@media(max-width:680px){
  #sb{display:none;}#main{display:none;}
  #mob-hd{display:flex;}#mob-tabs{display:block;}#mob-ct{display:block;}
  #app{flex-direction:column;}
}
@media(min-width:681px){#app{flex-direction:row;}}
</style>
</head>
<body>
<div id="bgimg"></div>
<div id="offbdg">✦ オフライン</div>
<div id="toast"></div>
<div id="app">
<nav id="sb">
  <div class="sbh"><div class="sbn">💫 StratoNote</div><div class="sbs">受験学習管理システム</div></div>
  <div class="sbtm">今日の学習<b id="sbt-d">0:00:00</b></div>
  <div class="sbnav">
    <div class="ni on" data-p="home" onclick="go('home')"><span class="ni-ic">⌂</span>ホーム</div>
    <div class="ni" data-p="study" onclick="go('study')"><span class="ni-ic">◷</span>学習</div>
    <div class="ni" data-p="cal" onclick="go('cal')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">◫</span>カレンダー</div>
    <div class="ni" data-p="tmr" onclick="go('tmr')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">◷</span>タイマー</div>
    <div class="ni" data-p="fc" onclick="go('fc')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">✦</span>暗記カード</div>
    <div class="ni" data-p="sk" onclick="go('sk')"><span class="ni-ic">✧</span>スキルツリー</div>
    <div class="ni" data-p="grades" onclick="go('grades')"><span class="ni-ic">◎</span>成績</div>
    <div class="ni" data-p="an" onclick="go('an')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">◎</span>テスト分析</div>
    <div class="ni" data-p="bdg" onclick="go('bdg')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">🏅</span>実績</div>
    <div class="ni" data-p="cfg" onclick="go('cfg')"><span class="ni-ic">◉</span>設定</div>
  </div>
  <div class="sbft" id="sbd-str">✦ 0日連続</div>
</nav>
<div id="main"><div id="desk-content"></div></div>
<div id="mob-hd">
  <span style="font-size:15px;font-weight:800;color:var(--ac2)">💫 StratoNote</span>
  <span style="font-size:12px;color:var(--ac2);font-weight:700;font-variant-numeric:tabular-nums" id="sbt-m">0:00:00</span>
</div>
<div id="mob-ct"></div>
<div id="mob-tabs">
  <div class="mtrow">
    <button class="mtab on" data-p="home" onclick="go('home')"><span class="mtic">⌂</span>ホーム</button>
    <button class="mtab" data-p="study" onclick="go('study')"><span class="mtic">◷</span>学習</button>
    <button class="mtab" data-p="sk" onclick="go('sk')"><span class="mtic">✧</span>スキル</button>
    <button class="mtab" data-p="grades" onclick="go('grades')"><span class="mtic">◎</span>成績</button>
    <button class="mtab" data-p="cfg" onclick="go('cfg')"><span class="mtic">◉</span>設定</button>
  </div>
</div>
</div>

<!-- MODALS -->

<script>
// §1 STATE & STORAGE ─────────────────────────
const SKEY='sn6';
const APP_VERSION='2.5';
const DATA_VERSION=2;

// §2 CONFIG — 定数はここに集約。他の場所にハードコードしない ───
const CFG = {
  // デフォルト教科リスト
  SUBJECTS: ['国語','古典','地理','日本史','世界史','公共','数学','物理','化学','生物','英語','情報'],
  // 教科カラーマップ（scolor() の参照元）
  SUBJECT_COLORS: {
    '国語':'#c0392b','古典':'#d35400','地理':'#27ae60','日本史':'#8e44ad',
    '世界史':'#6c3483','公共':'#16a085','数学':'#2471a3','物理':'#1a5276',
    '化学':'#117a65','生物':'#1e8449','英語':'#d4ac0d','情報':'#5d6d7e',
  },
  DEFAULT_COLOR: '#76c0ea',
  // 成績閾値
  SCORE: { GOOD: 80, WARN: 60 },     // %以上でOK/WARN/BAD
  LOAD:  { HIGH: 8,  MID: 4  },     // 負荷レベル
  // 学習記録
  MIN_SESSION_MS: 4000,             // これ未満は記録しない
  // ストレージ
  STORAGE_WARN_BYTES: 4_500_000,
  // タイマーキー
  TIMER_KEY: 'sn6_timer_start',
};

// §3 UI HELPERS — HTML文字列生成の共通部品 ─────────

/** 教科カラーを返す */
function subjColor(s){ return CFG.SUBJECT_COLORS[s] || CFG.DEFAULT_COLOR; }

/** 負荷レベルに応じた CSS カラー変数を返す */
function loadColor(v){ return v>=CFG.LOAD.HIGH?'var(--bad)':v>=CFG.LOAD.MID?'var(--warn)':'var(--ok)'; }

/** 得点%に応じた CSS カラー変数を返す */
function scoreColor(pct){ return pct>=CFG.SCORE.GOOD?'var(--ok)':pct>=CFG.SCORE.WARN?'var(--warn)':'var(--bad)'; }

/** バッジ HTML（色クラス付き） */
function badgeHTML(text, cls){ return `<span class="bdg ${cls||'ba'}">${text}</span>`; }

/** 進捗バー HTML（アニメーション付き、data-pct で JS が幅をセット） */
function progressBar(pct, color){
  return `<div class="srow-bw"><div class="srow-bf" data-pct="${pct}" style="width:0%;background:${color}"></div></div>`;
}

/** ナビリンクカード（ハブページ用） */
function navCard(page, icon, title, sub){
  return `<div onclick="go('${page}')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:16px;padding:18px">`
    +`<span style="font-size:32px">${icon}</span>`
    +`<div><div style="font-size:16px;font-weight:700">${title}</div><div style="font-size:12px;color:var(--t3);margin-top:2px">${sub}</div></div>`
    +`<span style="margin-left:auto;color:var(--ac2)">›</span></div>`;
}

/** ページヘッダー HTML */
function pageHeader(title, sub, leftBtn, rightBtns){
  const l = leftBtn
    ? `<div style="display:flex;align-items:center;gap:8px">${leftBtn}<div><div class="pt">${title}</div>${sub?`<div class="ps">${sub}</div>`:''}</div></div>`
    : `<div><div class="pt">${title}</div>${sub?`<div class="ps">${sub}</div>`:''}</div>`;
  const r = rightBtns ? `<div style="display:flex;gap:6px">${rightBtns}</div>` : '';
  return `<div class="ph">${l}${r}</div>`;
}

/** 戻るボタン HTML */
function backBtn(page, label){
  return `<button class="btn bs sm" onclick="go('${page}')" style="padding:5px 10px">← ${label||'戻る'}</button>`;
}
// DSUBJ は後方互換のエイリアス（loadS・importD 等が参照）
const DSUBJ = CFG.SUBJECTS;
let S={subjects:[...DSUBJ],events:[],sessions:[],decks:[],skills:{},rounds:[],settings:{bg:''},todayMs:0,todayMs_base:0,weekMs:[0,0,0,0,0,0,0],streak:0,lastDate:'',earnedBadges:[],earnedDates:{},_didReset:true};
function loadS(){
  try{const d=localStorage.getItem(SKEY);if(d)S=Object.assign({},S,JSON.parse(d));}catch(e){}
  DSUBJ.forEach(s=>{if(!S.skills[s])S.skills[s]=[];});
  S.subjects=S.subjects||[...DSUBJ];
  S.subjects.forEach(s=>{if(!S.skills[s])S.skills[s]=[];});
  S.earnedBadges=S.earnedBadges||[];
  S.earnedDates=S.earnedDates||{};
  S.todayMs_base=S.todayMs||0;
  const td=today();
  if(S.lastDate&&S.lastDate!==td){S.todayMs=0;S.todayMs_base=0;}
  // weekMs: reset if saved date is from a previous week
  (function(){
    var now=new Date();
    var dow=now.getDay();
    var monOffset=dow===0?-6:1-dow;
    var weekStart=new Date(now);weekStart.setDate(now.getDate()+monOffset);weekStart.setHours(0,0,0,0);
    var lastSaved=S.lastDate?new Date(S.lastDate):null;
    if(!lastSaved||lastSaved<weekStart){S.weekMs=[0,0,0,0,0,0,0];}
  })();
}
function saveS(){
  try{
    const json=JSON.stringify(S);
    if(json.length>CFG.STORAGE_WARN_BYTES){toast('注意: データ容量が大きくなっています。エクスポートを推奨します');}
    localStorage.setItem(SKEY,json);
  }catch(e){toast('注意: 保存容量が不足しています。背景画像を削除するか、エクスポートしてください');}
}
function today(){return new Date().toISOString().slice(0,10);}
function pad(n){return String(n).padStart(2,'0');}
function fmtMs(ms,f){const t=Math.floor((ms||0)/1e3),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return f?pad(h)+':'+pad(m)+':'+pad(s):h+'h'+pad(m)+'m';}
function fmtMsClock(ms){const t=Math.floor((ms||0)/1e3),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return pad(h)+':'+pad(m)+':'+pad(s);}

// §4 NAVIGATION ─────────────────────────────
let curP='home';
const isMob=()=>window.innerWidth<=680;
function getC(){return isMob()?document.getElementById('mob-ct'):document.getElementById('desk-content');}
function go(p){
  curP=p;
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('on',el.getAttribute('data-p')===p));
  // Mobile tabs: highlight parent tab for sub-pages
  const mobParent={'cal':'study','tmr':'study','fc':'study','an':'grades','bdg':'grades'};
  const activeTab=mobParent[p]||p;
  document.querySelectorAll('.mtab').forEach(el=>el.classList.toggle('on',el.getAttribute('data-p')===activeTab));
  const c=getC();if(!c)return;
  c.innerHTML=genP(p);
  setTimeout(()=>postRender(p),30);
}
function genP(p){
  if(p==='home')return pHome();
  if(p==='study')return pStudy();
  if(p==='cal')return pCal();if(p==='tmr')return pTmr();
  if(p==='fc')return pFC();if(p==='sk')return pSK();
  if(p==='grades')return pGrades();
  if(p==='an')return pAn();if(p==='bdg')return pBadge();if(p==='cfg')return pCfg();
  return '';
}
function postRender(p){
  if(p==='cal')renderCalGrid();
  if(p==='an'){renderAnOverall();renderAnSubj();setTimeout(animateAnBars,50);}
}
let lastMob=isMob();
window.addEventListener('resize',()=>{
  const nm=isMob();
  if(nm!==lastMob){lastMob=nm;go(curP);}
  // 画面が小さくなっても最低限の幅を確保（zoom-out防止は viewport meta で対応済み）
});

// §5 MODAL ──────────────────────────────────
let editEvIdx=-1,editRndIdx=-1;
function openM(id){fillSels();if(id==='mev'){document.getElementById('evd').value=selDate||today();}if(id==='mrnd')buildRndChips();document.getElementById(id).classList.add('on');}
function closeM(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.mov').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('on');}));
function fillSels(){
  ['evs','dks'].forEach(id=>{const el=document.getElementById(id);if(!el)return;const pv=el.value;el.innerHTML=(S.subjects||[]).map(s=>`<option value="${s}">${s}</option>`).join('');if(pv)el.value=pv;});
}

// §6 TOAST ──────────────────────────────────
let toastT;
function toast(msg){const t=document.getElementById('toast');clearTimeout(toastT);t.textContent=msg;t.classList.add('on');toastT=setTimeout(()=>t.classList.remove('on'),2600);}

// §7 HELPERS (計算・描画ユーティリティ) ─────────────
// scolor / lcolor は互換エイリアス。新規コードは subjColor / loadColor / scoreColor を使う
function scolor(s){ return subjColor(s); }
function lcolor(v){ return loadColor(v); }
function calcLoad(ds){const ev=(S.events||[]).filter(e=>e.date===ds).reduce((a,e)=>a+(e.load||1),0);const ses=Math.round((S.sessions||[]).filter(s=>new Date(s.ts).toISOString().slice(0,10)===ds).reduce((a,s)=>a+s.dur,0)/900000);return ev+ses;}
function wkDates(){const dow=new Date().getDay(),d=new Date();return Array.from({length:7},(_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()-dow+i);return dd.toISOString().slice(0,10);});}
var _trendCID=0;
function trendBarsHTML(lds){
  var cid='tc'+(_trendCID++);
  var days=['日','月','火','水','木','金','土'];
  var dow=new Date().getDay();
  requestAnimationFrame(function(){setTimeout(function(){drawTrendLine(cid,lds,days,dow);},20);});
  return'<canvas id="'+cid+'" style="width:100%;height:64px;display:block" height="64"></canvas>'
    +'<div style="display:flex;gap:4px;margin-top:4px">'
    +days.map(function(d,i){return'<div style="flex:1;text-align:center;font-size:9px;color:'+(i===dow?'var(--ac2)':'var(--t3)')+'">'+d+'</div>';}).join('')
    +'</div>';
}
function drawTrendLine(cid,lds,days,dow){
  var cv=document.getElementById(cid);if(!cv)return;
  var dpr=window.devicePixelRatio||1;
  var W=cv.offsetWidth||300;var H=64;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  var ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  var pd={t:6,r:8,b:4,l:8};
  var gW=W-pd.l-pd.r;var gH=H-pd.t-pd.b;
  var mx=Math.max(Math.max.apply(null,lds),10);
  var n=lds.length;
  // reference line at 10
  var refY=pd.t+gH-(10/mx*gH);
  ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(76,168,216,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pd.l,refY);ctx.lineTo(W-pd.r,refY);ctx.stroke();
  ctx.setLineDash([]);
  // gradient fill
  var grad=ctx.createLinearGradient(0,pd.t,0,pd.t+gH);
  grad.addColorStop(0,'rgba(76,168,216,0.25)');grad.addColorStop(1,'rgba(76,168,216,0.02)');
  ctx.beginPath();
  var pts=lds.map(function(v,i){return{x:pd.l+(n===1?gW/2:i/(n-1)*gW),y:pd.t+gH-(v/mx*gH)};});
  ctx.moveTo(pts[0].x,pd.t+gH);
  pts.forEach(function(p){ctx.lineTo(p.x,p.y);});
  ctx.lineTo(pts[pts.length-1].x,pd.t+gH);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // line
  ctx.beginPath();ctx.strokeStyle=CFG.DEFAULT_COLOR;ctx.lineWidth=2;ctx.lineJoin='round';
  pts.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});
  ctx.stroke();
  // dots — 負荷レベルに応じて CFG 閾値で色分け
  pts.forEach(function(p,i){
    var v=lds[i];
    var c=v>=CFG.LOAD.HIGH?'#d84848':v>=CFG.LOAD.MID?'#e09030':CFG.DEFAULT_COLOR;
    ctx.beginPath();ctx.arc(p.x,p.y,i===dow?5:3,0,Math.PI*2);
    ctx.fillStyle=i===dow?c:'rgba(76,168,216,0.7)';ctx.fill();
    if(i===dow){ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();}
  });
}
function updTime(){
  const ts=fmtMsClock(S.todayMs);
  ['sbt-d','sbt-m'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=ts;});
  const tt=document.getElementById('t-today-disp');if(tt)tt.textContent=ts;
}

// §7b SUBJECT PIE CHART ─────────────────────────
/**
 * 教科別学習時間を円グラフ＋凡例で表示する HTML を返す。
 * sd  : { 教科名: ミリ秒, ... }
 * tot : 合計ミリ秒（0 除算防止のため呼び出し元が担保）
 */
function buildSubjPieHTML(sd, tot) {
  var cid = 'pie' + (_trendCID++);
  var entries = Object.entries(sd).sort(function(a,b){return b[1]-a[1];});
  // Canvas は requestAnimationFrame 後に描画
  requestAnimationFrame(function(){
    setTimeout(function(){ drawSubjPie(cid, entries, tot); }, 20);
  });
  // 凡例 HTML（右側に並べる）
  var legendH = entries.map(function(kv){
    var subj = kv[0], ms = kv[1];
    var pct = Math.round(ms / tot * 100);
    var h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
    return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">'
      + '<div style="width:10px;height:10px;border-radius:50%;background:'+scolor(subj)+';flex-shrink:0"></div>'
      + '<div style="font-size:11px;font-weight:700;flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+subj+'</div>'
      + '<div style="font-size:11px;color:var(--t2);white-space:nowrap">'+h+'h'+pad(m)+'m</div>'
      + '<div style="font-size:11px;font-weight:800;color:var(--ac2);width:32px;text-align:right">'+pct+'%</div>'
      + '</div>';
  }).join('');
  return '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">'
    + '<canvas id="'+cid+'" width="120" height="120" style="width:120px;height:120px;flex-shrink:0"></canvas>'
    + '<div style="flex:1;min-width:140px">'+legendH+'</div>'
    + '</div>';
}

/** Canvas に教科別ドーナツ円グラフを描く */
function drawSubjPie(cid, entries, tot) {
  var cv = document.getElementById(cid);
  if (!cv) return;
  var dpr = window.devicePixelRatio || 1;
  var SIZE = 120;
  cv.width = SIZE * dpr; cv.height = SIZE * dpr;
  cv.style.width = SIZE + 'px'; cv.style.height = SIZE + 'px';
  var ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  var cx = SIZE / 2, cy = SIZE / 2, R = SIZE / 2 - 6, inner = R * 0.52;
  var angle = -Math.PI / 2; // 12時から開始
  // セグメント描画
  entries.forEach(function(kv){
    var ms = kv[1];
    var sweep = (ms / tot) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, angle, angle + sweep);
    ctx.closePath();
    ctx.fillStyle = scolor(kv[0]);
    ctx.fill();
    // セグメント間のギャップ（白い細線）
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, angle, angle + sweep);
    ctx.closePath();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    angle += sweep;
  });
  // ドーナツの穴（中央を白く抜く）
  ctx.beginPath();
  ctx.arc(cx, cy, inner, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  // 中央テキスト：合計時間
  var totalH = Math.floor(tot / 3600000);
  var totalM = Math.floor((tot % 3600000) / 60000);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#1c2a36';
  ctx.font = 'bold ' + Math.round(14 * dpr / dpr) + 'px sans-serif';

function toggleT(){

}

function allAncestorsDone(id,im){

function toggleSK2(id){
  const skills=S.skills[curSKS];if(!skills)return;
  const im={};skills.forEach(s=>im[s.id]=s);
  const sk=im[id];if(!sk)return;
  if(sk.status!=='done'){
    // Trying to complete: check all ancestors
    if(!allAncestorsDone(id,im)){toast('前提スキルがすべて完了していません');return;}
  }else{
    // Uncompleting: also uncheck all descendants
    const uncheck=(nid)=>{skills.filter(s=>s.preId===nid).forEach(child=>{if(child.status==='done'){child.status='open';uncheck(child.id);}});};
    uncheck(id);
  }

function renderSKTree(){
  var skills=S.skills[curSKS]||[];
  var wrap=document.getElementById('sk-map-svg-wrap');if(!wrap)return;
  if(!skills.length){
    wrap.innerHTML='<div style="text-align:center;padding:32px;color:var(--t3)"><div style="font-size:28px;margin-bottom:8px">&#10022;</div>'
      +'<div style="font-size:13px;font-weight:600">スキルがありません</div>'
      +'<div style="margin-top:10px"><button class="btn bp sm" onclick="openSkForm(null)">+ 最初のスキルを追加</button></div></div>';
    return;
  }
  var im={};skills.forEach(function(s){im[s.id]=s;});
  var ch={};skills.forEach(function(s){if(s.preId&&im[s.preId]){ch[s.preId]=ch[s.preId]||[];ch[s.preId].push(s.id);}});
  var roots=skills.filter(function(s){return!s.preId||!im[s.preId];});
  var screenW=window.innerWidth||375;
  var NW=Math.max(120, Math.min(150, Math.round(screenW/3))), NH=48, VG=90, HG=20, BTNR=16, MARGIN=40;
  var _sw={};
  function sw(id){if(_sw[id]!==undefined)return _sw[id];var c=ch[id]||[];var w=c.length===0?(NW+HG):c.reduce(function(acc,cid){return acc+sw(cid);},0);_sw[id]=w;return w;}
  var autoPos={};
  function place(id,cx,y){autoPos[id]={x:cx-NW/2,y:y};var c=ch[id]||[];if(!c.length)return;var total=c.reduce(function(acc,cid){return acc+sw(cid);},0);var ox=cx-total/2;c.forEach(function(cid){var w=sw(cid);place(cid,ox+w/2,y+NH+VG);ox+=w;});}
  var ox=MARGIN+BTNR+NW/2;roots.forEach(function(r){var w=sw(r.id);place(r.id,ox+w/2-NW/2,20);ox+=w;});
  var pos={};
  skills.forEach(function(sk){pos[sk.id]=(sk.manualX!==undefined&&sk.manualY!==undefined)?{x:sk.manualX,y:sk.manualY}:(autoPos[sk.id]||{x:20,y:20});});
  var maxX=0,maxY=0;
  Object.values(pos).forEach(function(p){if(p.x+NW+BTNR*2+8>maxX)maxX=p.x+NW+BTNR*2+8;if(p.y+NH+40>maxY)maxY=p.y+NH+40;});
  var W=Math.max(maxX+20,340),H=Math.max(maxY,200);
  var sc=scolor(curSKS),edges='',nodes='';

  });
  skills.forEach(function(sk){
    var p=pos[sk.id];if(!p)return;
    var unlocked=allAncestorsDone(sk.id,im);

    var fill,stroke,tc;
    if(done){fill=sc;stroke=sc;tc='#fff';}else if(locked){fill='#f0f4f8';stroke='#c4e4f5';tc='#8aa4b4';}else{fill='#fff';stroke=sc;tc='#1c2a36';}
    var nm=sk.name.length>13?sk.name.slice(0,12)+'\u2026':sk.name;
    var plusCx=p.x+NW+8+BTNR,delCx=p.x-8-BTNR,btnCy=p.y+NH/2;
    nodes+='<g data-action="toggle" data-id="'+sk.id+'" data-drag="1" style="cursor:grab">'
      +'<rect x="'+p.x+'" y="'+p.y+'" width="'+NW+'" height="'+NH+'" rx="9" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(done?2:1.5)+'"/>'
      +(done?'<text x="'+(p.x+NW-10)+'" y="'+(p.y+11)+'" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#fff">\u2713</text>':'')
      +(locked?'<text x="'+(p.x+NW/2)+'" y="'+(p.y+NH/2)+'" text-anchor="middle" dominant-baseline="central" font-size="15" fill="'+tc+'">\uD83D\uDD12</text>':'<text x="'+(p.x+NW/2)+'" y="'+(p.y+NH/2)+'" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="'+tc+'">'+nm+'</text>')
      +'</g>';
    nodes+='<g data-action="plus" data-id="'+sk.id+'" style="cursor:pointer">'
      +'<circle cx="'+plusCx+'" cy="'+btnCy+'" r="'+BTNR+'" fill="#eef7fd" stroke="'+sc+'" stroke-width="1.5"/>'
      +'<text x="'+plusCx+'" y="'+btnCy+'" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="'+sc+'">+</text>'
      +'</g>';
    nodes+='<g data-action="del" data-id="'+sk.id+'" style="cursor:pointer">'
      +'<circle cx="'+delCx+'" cy="'+btnCy+'" r="'+BTNR+'" fill="#fdf0f0" stroke="#f4b8b8" stroke-width="1.5"/>'
      +'<text x="'+delCx+'" y="'+btnCy+'" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#d84848">\u00d7</text>'
      +'</g>';
  });
  wrap.innerHTML='<svg id="sktree-svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:'+W+'px;touch-action:none">'+edges+nodes+'</svg>';
  var svg=wrap.querySelector('svg');if(!svg)return;
  wrap.querySelectorAll('g[data-action="toggle"]').forEach(function(g){
    var id=g.getAttribute('data-id');

  });
  // Drag to reposition
  var THRESHOLD=6;
  wrap.querySelectorAll('g[data-drag="1"]').forEach(function(g){
    var id=g.getAttribute('data-id');
    var dragging=false,startX=0,startY=0,origX=0,origY=0,moved=false;
    function getXY(e){var t=e.touches?e.touches[0]:e;var rect=svg.getBoundingClientRect();var sx=parseFloat(svg.getAttribute('width'))/rect.width,sy=parseFloat(svg.getAttribute('height'))/rect.height;return{x:(t.clientX-rect.left)*sx,y:(t.clientY-rect.top)*sy};}
    function onStart(e){

        t.setAttribute('x',parseFloat(t.getAttribute('data-ox'))+(nx-origX));
        t.setAttribute('y',parseFloat(t.getAttribute('data-oy'))+(ny-origY));
      });

      skills.forEach(function(sk){if(!sk.preId||!livePts[sk.preId]||!livePts[sk.id])return;var pp=livePts[sk.preId],cp=livePts[sk.id];var x1=pp.x+NW/2,y1=pp.y+NH,x2=cp.x+NW/2,y2=cp.y,midy=(y1+y2)/2;var isDone=allAncestorsDone(sk.id,im)&&im[sk.preId]&&im[sk.preId].status==='done';var path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d','M'+x1+','+y1+' C'+x1+','+midy+' '+x2+','+midy+' '+x2+','+y2);path.setAttribute('fill','none');path.setAttribute('stroke',isDone?sc:'#c4e4f5');path.setAttribute('stroke-width',isDone?2:1.5);if(!isDone)path.setAttribute('stroke-dasharray','5,4');svg.insertBefore(path,svg.firstChild);});
    }
    function onEnd(){

/**
 * §13b SK MAP PAN ────────────────────────────
 * wrap（#sk-map-svg-wrap）の親（#sk-map-body）上で
 * スキルノード以外の空白をドラッグするとパンできる。
 * renderSKTree の最後に毎回呼ばれ、前回のリスナーを置き換える。
 */
var _skPanCleanup = null; // 前回の cleanup 関数

function _initSkMapPan(wrap) {
  var body = document.getElementById('sk-map-body');
  if (!body) return;

  // 前回のリスナーを除去
  if (_skPanCleanup) { _skPanCleanup(); _skPanCleanup = null; }

  // SVG の現在の translate オフセット
  var panX = 0, panY = 0;
  var startX = 0, startY = 0;
  var startPanX = 0, startPanY = 0;
  var isPanning = false;

  // wrap の現在の transform を読み取る（再描画後も維持）
  var m = (wrap.style.transform || '').match(/translate\((-?\d+(?:\.\d+)?)px,\s*(-?\d+(?:\.\d+)?)px\)/);
  if (m) { panX = parseFloat(m[1]); panY = parseFloat(m[2]); }

  function applyTransform() {
    wrap.style.transform = 'translate(' + panX + 'px,' + panY + 'px)';
  }
  applyTransform();

  function isOnSkillNode(target) {
    return !!(target && (
      target.closest('g[data-drag="1"]') ||
      target.closest('g[data-action="plus"]') ||
      target.closest('g[data-action="del"]')
    ));
  }

  function onPanStart(e) {
    if (isOnSkillNode(e.target)) return; // スキルノード上なら無視
    isPanning = true;
    startX = e.clientX; startY = e.clientY;
    startPanX = panX; startPanY = panY;
    body.classList.add('panning');
    body.setPointerCapture && body.setPointerCapture(e.pointerId);
    e.preventDefault();
  }
  function onPanMove(e) {
    if (!isPanning) return;
    var dx = e.clientX - startX;
    var dy = e.clientY - startY;
    panX = startPanX + dx;
    panY = startPanY + dy;
    applyTransform();
  }
  function onPanEnd(e) {
    if (!isPanning) return;
    isPanning = false;
    body.classList.remove('panning');
  }

  // タッチ対応
  var touchId = null;
  function onTouchStart(e) {
    if (isOnSkillNode(e.target)) return;
    if (e.touches.length !== 1) return;
    touchId = e.touches[0].identifier;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startPanX = panX; startPanY = panY;
    isPanning = true;
    body.classList.add('panning');
  }
  function onTouchMove(e) {
    if (!isPanning || touchId === null) return;
    var t = Array.from(e.changedTouches).find(function(x){return x.identifier===touchId;});
    if (!t) return;
    e.preventDefault();
    panX = startPanX + (t.clientX - startX);
    panY = startPanY + (t.clientY - startY);
    applyTransform();
  }
  function onTouchEnd(e) {
    isPanning = false; touchId = null;
    body.classList.remove('panning');
  }

  body.addEventListener('pointerdown', onPanStart);
  body.addEventListener('pointermove', onPanMove);
  body.addEventListener('pointerup', onPanEnd);
  body.addEventListener('pointercancel', onPanEnd);
  body.addEventListener('touchstart', onTouchStart, {passive:true});
  body.addEventListener('touchmove', onTouchMove, {passive:false});
  body.addEventListener('touchend', onTouchEnd);

  _skPanCleanup = function() {
    body.removeEventListener('pointerdown', onPanStart);
    body.removeEventListener('pointermove', onPanMove);
    body.removeEventListener('pointerup', onPanEnd);
    body.removeEventListener('pointercancel', onPanEnd);
    body.removeEventListener('touchstart', onTouchStart);
    body.removeEventListener('touchmove', onTouchMove);
    body.removeEventListener('touchend', onTouchEnd);
  };
}

// テスト平均計算：生の得点/満点ベースで正確に算出
function calcRoundAvg(r){
  var entries=Object.values(r.scores||{});
  if(!entries.length)return 0;
  var totalScore=entries.reduce(function(a,s){return a+(parseFloat(s.score)||0);},0);
  var totalMax=entries.reduce(function(a,s){return a+(parseFloat(s.max)||0);},0);
  return totalMax>0?Math.round(totalScore/totalMax*100):0;
}
// 教科ごとの%（表示用）
function calcSubjPct(sc){
  var score=parseFloat(sc.score)||0;
  var max=parseFloat(sc.max)||0;
  return max>0?Math.round(score/max*100):0;
}

  var sumHtml='';
  if(rounds.length>0){
    // 正確な平均：合計得点/合計満点
    var avgs=rounds.map(calcRoundAvg);
    var oa=Math.round(avgs.reduce(function(a,b){return a+b;},0)/avgs.length);
    // 全テスト通じて最も平均の高い・低い教科
    var bySubjScore={};
    rounds.forEach(function(r){Object.entries(r.scores||{}).forEach(function(kv){
      var subj=kv[0],sc=kv[1];
      bySubjScore[subj]=bySubjScore[subj]||{totS:0,totM:0};
      bySubjScore[subj].totS+=parseFloat(sc.score)||0;
      bySubjScore[subj].totM+=parseFloat(sc.max)||0;
    });});
    var subjAvgs=Object.entries(bySubjScore).filter(function(kv){return kv[1].totM>0;}).map(function(kv){return{subj:kv[0],pct:Math.round(kv[1].totS/kv[1].totM*100)};});
    subjAvgs.sort(function(a,b){return b.pct-a.pct;});
    var bestSubj=subjAvgs.length?subjAvgs[0].subj+'（'+subjAvgs[0].pct+'%）':'−';
    var worstSubj=subjAvgs.length?subjAvgs[subjAvgs.length-1].subj+'（'+subjAvgs[subjAvgs.length-1].pct+'%）':'−';
    // 線形回帰トレンド
    var n=avgs.length,xm=(n-1)/2,ym=avgs.reduce(function(a,b){return a+b;},0)/n,num=0,den=0;
    avgs.forEach(function(v,i){num+=(i-xm)*(v-ym);den+=(i-xm)*(i-xm);});
    var slope=den>0?num/den:0;
    var trendStr=slope>0.5?'↑ 上昇傾向':slope<-0.5?'↓ 下降傾向':'→ 安定';
    var trendC=slope>0.5?'var(--ok)':slope<-0.5?'var(--bad)':'var(--t3)';
    // 伸びた・下がった教科（日付順で初回→最終比較）
    var bySubjArr={};
    rounds.forEach(function(r){Object.entries(r.scores||{}).forEach(function(kv){var subj=kv[0],sc=kv[1];bySubjArr[subj]=bySubjArr[subj]||[];bySubjArr[subj].push({pct:calcSubjPct(sc),date:r.date});});});
    var mostImproved='−',mostImprovedDiff=0,mostDeclined='−',mostDeclinedDiff=0;
    Object.entries(bySubjArr).forEach(function(kv){

      if(arr.length<2)return;
      var diff=arr[arr.length-1].pct-arr[0].pct;
      if(diff>mostImprovedDiff){mostImprovedDiff=diff;mostImproved=s+' (+'+diff+'%)';}

    });
    sumHtml='<div class="stats">'

      +'<div class="sc"><div class="sv" style="font-size:13px;color:'+trendC+'">'+trendStr+'</div><div class="sl">全体傾向</div></div>'
      +'</div>'
      +'<div class="card"><div class="ct">サマリー</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">'
      +'<div style="padding:8px;background:var(--acbg);border-radius:var(--rs)"><div style="color:var(--t3);font-size:10px">得意教科（平均）</div><b style="color:var(--ok);font-size:11px">'+bestSubj+'</b></div>'
      +'<div style="padding:8px;background:var(--acbg);border-radius:var(--rs)"><div style="color:var(--t3);font-size:10px">苦手教科（平均）</div><b style="color:var(--bad);font-size:11px">'+worstSubj+'</b></div>'
      +'<div style="padding:8px;background:var(--acbg);border-radius:var(--rs)"><div style="color:var(--t3);font-size:10px">最も伸びた教科</div><b style="color:var(--ok);font-size:11px">'+mostImproved+'</b></div>'
      +'<div style="padding:8px;background:var(--acbg);border-radius:var(--rs)"><div style="color:var(--t3);font-size:10px">最も下がった教科</div><b style="color:var(--bad);font-size:11px">'+mostDeclined+'</b></div>'
      +'</div></div>';
  }
  // 教科別成績テーブル（正確な平均：合計得点/合計満点）
  var subjStatsHtml='';
  if(rounds.length>0){
    var bySubj2={};
    rounds.forEach(function(r){Object.entries(r.scores||{}).forEach(function(kv){
      var subj=kv[0],sc=kv[1];
      bySubj2[subj]=bySubj2[subj]||[];
      bySubj2[subj].push({score:parseFloat(sc.score)||0,max:parseFloat(sc.max)||0,pct:calcSubjPct(sc),dev:sc.dev!=null?parseFloat(sc.dev):null,date:r.date});
    });});
    var rows=Object.entries(bySubj2).map(function(kv){
      var subj=kv[0],arr=kv[1];
      arr.sort(function(a,b){return a.date.localeCompare(b.date);});
      var totS=arr.reduce(function(a,x){return a+x.score;},0);
      var totM=arr.reduce(function(a,x){return a+x.max;},0);
      var avg2=totM>0?Math.round(totS/totM*100):Math.round(arr.reduce(function(a,x){return a+x.pct;},0)/arr.length);
      var diff=arr.length>=2?arr[arr.length-1].pct-arr[0].pct:null;
      var diffStr=diff===null?'−':diff>0?'+'+diff+'%':diff<0?diff+'%':'±0%';
      var diffC=diff===null?'var(--t3)':diff>0?'var(--ok)':diff<0?'var(--bad)':'var(--t3)';
      var devNums=arr.filter(function(x){return x.dev!=null;}).map(function(x){return x.dev;});

      var sc=scolor(subj);
      return'<tr style="border-bottom:1px solid var(--br)">'

        +'<td style="padding:7px 6px;text-align:center;font-size:12px;color:var(--t3)">'+arr.length+'回</td>'
        +'<td style="padding:7px 6px;text-align:center;font-size:13px;font-weight:800;color:'+scoreColor(avg2)+'">'+avg2+'%</td>'
        +'<td style="padding:7px 6px;text-align:center;font-size:12px;font-weight:700;color:'+diffC+'">'+diffStr+'</td>'
        +'<td style="padding:7px 6px;text-align:center;font-size:12px;color:var(--t3)">'+devStr+'</td>'
        +'</tr>';
    }).join('');
    if(rows)subjStatsHtml='<div class="card"><div class="ct">教科別成績サマリー</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'
      +'<thead><tr style="border-bottom:2px solid var(--br)">'

      +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';

  var listH=[...rounds].reverse().map(function(r,ri){

function drawLineChart(ctx,W,H,datasets,labels,colors,names){
  ctx.clearRect(0,0,W,H);
  var n=labels.length;if(!n)return;
  var legH=(names&&names.length>1)?Math.min(names.length,8)*14+8:0;
  var pd={t:20,r:14,b:32,l:38};
  var gW=W-pd.l-pd.r;
  var gH=H-pd.t-pd.b-legH;
  if(gW<=0||gH<=0)return;
  var allVals=[];
  datasets.forEach(function(d){d.forEach(function(v){if(v!=null)allVals.push(v);});});
  if(!allVals.length)return;
  var mn=Math.max(0,Math.min.apply(null,allVals)-10);
  var mx=Math.min(100,Math.max.apply(null,allVals)+10);
  if(mx-mn<10){mn=Math.max(0,mn-5);mx=Math.min(100,mx+5);}
  var rng=mx-mn||1;
  // Grid
  ctx.strokeStyle='#cfe6f4';ctx.lineWidth=0.5;
  [0,20,40,60,80,100].forEach(function(v){
    if(v<mn||v>mx)return;
    var y=pd.t+gH-((v-mn)/rng*gH);
    ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(W-pd.r,y);ctx.stroke();
    ctx.fillStyle='#8aa4b4';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(v,pd.l-3,y+3);
  });
  // X labels
  labels.forEach(function(lb,i){
    var x=pd.l+(n===1?gW/2:i/(n-1)*gW);
    ctx.fillStyle='#8aa4b4';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(lb,x,H-legH-4);
  });
  // Lines
  datasets.forEach(function(data,di){
    var color=colors[di]||CFG.DEFAULT_COLOR;
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';
    var started=false;
    data.forEach(function(v,i){
      if(v===null){started=false;return;}
      var x=pd.l+(n===1?gW/2:i/(n-1)*gW);
      var y=pd.t+gH-((v-mn)/rng*gH);
      if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Fill for single dataset
    if(datasets.length===1){
      ctx.save();
      var grad=ctx.createLinearGradient(0,pd.t,0,pd.t+gH);
      grad.addColorStop(0,color+'40');grad.addColorStop(1,color+'05');
      ctx.beginPath();
      var pts=data.map(function(v,i){return v!=null?{x:pd.l+(n===1?gW/2:i/(n-1)*gW),y:pd.t+gH-((v-mn)/rng*gH)}:null;}).filter(Boolean);
      if(pts.length>=2){
        ctx.moveTo(pts[0].x,pd.t+gH);
        pts.forEach(function(p){ctx.lineTo(p.x,p.y);});
        ctx.lineTo(pts[pts.length-1].x,pd.t+gH);
        ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      }
      ctx.restore();
    }
    // Dots + values
    data.forEach(function(v,i){
      if(v===null)return;
      var x=pd.l+(n===1?gW/2:i/(n-1)*gW);
      var y=pd.t+gH-((v-mn)/rng*gH);
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      var vc=v>=80?'#3aaa72':v>=60?'#e09030':'#d84848';
      ctx.fillStyle=vc;ctx.font='bold 9px sans-serif';ctx.textAlign='center';
      ctx.fillText(v+'%',x,y-8);
    });
    // Legend
    if(names&&names.length>1&&legH>0){
      var ly=H-legH+di*14+7;
      if(ly<H){
        ctx.fillStyle=color;ctx.fillRect(pd.l,ly-4,14,8);
        ctx.fillStyle='#4a6478';ctx.font='10px sans-serif';ctx.textAlign='left';
        ctx.fillText(names[di].slice(0,6),pd.l+18,ly+3);
      }
    }
  });
}

function checkBadges(){
  var newBadge=false;
  S.earnedDates=S.earnedDates||{};
  BADGE_DEFS.forEach(function(b){
    if(!S.earnedBadges.includes(b.id)&&b.check()){
      S.earnedBadges.push(b.id);
      S.earnedDates[b.id]=new Date().toISOString().slice(0,10);
      newBadge=true;
      setTimeout(function(){toast('実績解除「'+b.name+'」');},500);
    }
  });
  if(newBadge)saveS();
}

function pBadge(){
  var earned=new Set(S.earnedBadges);
  var dates=S.earnedDates||{};
  var tNames=['','Tier 1 第一歩','Tier 2 努力の証','Tier 3 ケツイを力に','Tier 4 ゴリラ級','Tier 5 天音かなた'];
  var tColors=['','#8aa4b4','#3aaa72','#76c0ea','#e09030','#d84848'];
  var nonGag=BADGE_DEFS.filter(function(b){return b.tier>0;});
  var ng=nonGag.filter(function(b){return earned.has(b.id);}).length;
  var pct=nonGag.length?Math.round(ng/nonGag.length*100):0;
  var out='';
  out+='<div class="ph"><div style="display:flex;align-items:center;gap:8px">';
  out+='<button class="btn bs sm" onclick="go(\'grades\')" style="padding:5px 10px">← 成績</button>';
  out+='<div class="pt">実績</div></div>';
  out+='<div class="ps">'+S.earnedBadges.length+'/'+BADGE_DEFS.length+' 解除済</div></div>';
  out+='<div class="card"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">';
  out+='<span>達成率</span><b style="color:var(--ac2)">'+pct+'%</b></div>';
  out+='<div class="lb" style="height:10px"><div class="lbf" style="width:'+pct+'%;background:var(--ac)"></div></div></div>';
  for(var tier=1;tier<=5;tier++){
    var tb=BADGE_DEFS.filter(function(b){return(b.tier||1)===tier;});
    if(!tb.length)continue;
    var ec=tb.filter(function(b){return earned.has(b.id);}).length;
    out+='<div style="font-size:10px;font-weight:700;color:'+tColors[tier]+';margin:14px 0 8px;letter-spacing:.8px;text-transform:uppercase">'+tNames[tier]+' ('+ec+'/'+tb.length+')</div>';
    out+='<div class="badge-grid">';
    tb.forEach(function(b){out+=makeBadgeCard(b,earned,dates);});
    out+='</div>';
  }
  var gag=BADGE_DEFS.filter(function(b){return b.tier===0;});
  if(gag.length){
    var eg=gag.filter(function(b){return earned.has(b.id);}).length;
    out+='<div style="font-size:10px;font-weight:700;color:#8aa4b4;margin:14px 0 8px;letter-spacing:.8px">ネタ実績 ('+eg+'/'+gag.length+')</div>';
    out+='<div class="badge-grid">';
    gag.forEach(function(b){out+=makeBadgeCard(b,earned,dates,true);});
    out+='</div>';
  }
  return out;
}
function makeBadgeCard(b,earned,dates,isGag){
  var e=earned.has(b.id);
  var ds=e&&dates[b.id]?'<div style="font-size:9px;color:var(--t3);margin-top:3px">'+dates[b.id]+'</div>':'';
  var border=isGag?'border-style:dashed':'';
  var s='<div class="badge-card '+(e?'earned ':'')+'" onclick="showAchDetail(this)" data-bid="'+b.id+'" style="cursor:pointer;'+border+'">';
  s+='<span class="badge-icon" style="font-size:22px">'+(e?b.icon:'?')+'</span>';
  s+='<div style="font-size:11px;font-weight:700;margin-bottom:2px">'+(e?b.name:'???')+'</div>';
  s+=(e?'<div style="font-size:10px;color:var(--t2);line-height:1.4">'+b.desc.slice(0,30)+(b.desc.length>30?'...':'')+'</div>'+ds:'<div style="font-size:10px;color:var(--t3)">未解除</div>');
  s+='</div>';
  return s;
}

function showAchDetail(el){
  var id=el.getAttribute('data-bid');
  var b=BADGE_DEFS.find(function(x){return x.id===id;});
  if(!b)return;
  var isEarned=S.earnedBadges.includes(id);
  var dates=S.earnedDates||{};
  var tierNames=['ネタ','Tier 1','Tier 2','Tier 3','Tier 4','Tier 5'];
  var prev=document.getElementById('ach-detail-overlay');if(prev)prev.remove();
  var overlay=document.createElement('div');
  overlay.id='ach-detail-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;display:flex;align-items:flex-end;justify-content:center';
  var box=document.createElement('div');
  box.style.cssText='background:var(--card);border-radius:14px 14px 0 0;padding:24px 20px;width:100%;max-width:480px;padding-bottom:calc(20px + var(--sb));border-top:2px solid var(--ac)';
  var center=document.createElement('div');
  center.style.textAlign='center';
  var iconEl=document.createElement('div');
  iconEl.style.cssText='font-size:40px;margin-bottom:8px';
  iconEl.textContent=isEarned?b.icon:'?';
  var nameEl=document.createElement('div');
  nameEl.style.cssText='font-size:18px;font-weight:800;margin-bottom:4px';
  nameEl.textContent=isEarned?b.name:'???';
  var tierEl=document.createElement('div');
  tierEl.style.cssText='font-size:11px;color:var(--t3);margin-bottom:12px';
  tierEl.textContent=tierNames[b.tier||0];
  var descEl=document.createElement('div');
  if(isEarned){
    descEl.style.cssText='font-size:13px;color:var(--t2);line-height:1.7;text-align:left;background:var(--acbg);border-radius:10px;padding:12px 14px';
    descEl.textContent=b.desc;
  } else {
    descEl.style.cssText='font-size:13px;color:var(--t3)';
    descEl.textContent='条件を満たすと解除されます';
  }
  center.appendChild(iconEl);center.appendChild(nameEl);center.appendChild(tierEl);center.appendChild(descEl);
  if(isEarned&&dates[id]){
    var dateEl=document.createElement('div');
    dateEl.style.cssText='margin-top:10px;font-size:11px;color:var(--t3)';
    dateEl.textContent='解除日: '+dates[id];
    center.appendChild(dateEl);
  }
  var closeBtn=document.createElement('button');
  closeBtn.className='btn bs';
  closeBtn.style.cssText='width:100%;justify-content:center;margin-top:16px';
  closeBtn.textContent='閉じる';
  closeBtn.onclick=function(){overlay.remove();};
  box.appendChild(center);box.appendChild(closeBtn);
  overlay.appendChild(box);
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

function saveSubj(){const n=document.getElementById('subjn').value.trim();if(!n){toast('教科名を入力');return;}if((S.subjects||[]).includes(n)){toast('すでに存在します');return;}S.subjects.push(n);S.skills[n]=[];saveS();closeM('msubj');toast('教科追加');go('cfg');document.getElementById('subjn').value='';}
function delSubj(i){if(!confirm('削除しますか？'))return;S.subjects.splice(i,1);saveS();go('cfg');toast('削除しました');}
function loadBg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=function(){const MAX=1200;let w=img.width,h=img.height;if(w>MAX||h>MAX){const sc=Math.min(MAX/w,MAX/h);w=Math.round(w*sc);h=Math.round(h*sc);}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);const compressed=cv.toDataURL('image/jpeg',0.72);S.settings=S.settings||{};S.settings.bg=compressed;applyBg(compressed);saveS();const kb=Math.round(compressed.length*0.75/1024);toast('背景を設定 ('+kb+'KB)');go('cfg');};img.src=ev.target.result;};r.readAsDataURL(f);}
function clearBg(){S.settings=S.settings||{};S.settings.bg='';applyBg('');saveS();toast('背景を解除');go('cfg');}
function applyBg(u){const el=document.getElementById('bgimg');if(u){el.style.backgroundImage=`url('${u}')`;el.style.display='block';}else{el.style.backgroundImage='';el.style.display='none';}}
function sanitizeStr(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function exportD(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='stratonote_'+today()+'.json';a.click();toast('エクスポート完了');}
function importD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const parsed=JSON.parse(ev.target.result);if(typeof parsed!=='object'||Array.isArray(parsed)){toast('エラー：データ形式が不正です');return;}['events','sessions','decks','rounds','subjects','earnedBadges'].forEach(k=>{if(parsed[k]!==undefined&&!Array.isArray(parsed[k]))delete parsed[k];});if(Array.isArray(parsed.events)){parsed.events=parsed.events.map(ev=>({...ev,title:sanitizeStr(ev.title||''),subj:sanitizeStr(ev.subj||'')}));}if(Array.isArray(parsed.decks)){parsed.decks=parsed.decks.map(function(dk){return Object.assign({},dk,{name:sanitizeStr(dk.name||''),cards:Array.isArray(dk.cards)?dk.cards.map(function(c){return Object.assign({},c,{q:sanitizeStr(c.q||''),a:sanitizeStr(c.a||'')});}):[]}); });}if(Array.isArray(parsed.rounds)){parsed.rounds=parsed.rounds.map(function(r){return Object.assign({},r,{name:sanitizeStr(r.name||'')});});}S=Object.assign({},S,parsed);DSUBJ.forEach(s=>{if(!S.skills[s])S.skills[s]=[];});(S.subjects||[]).forEach(s=>{if(!S.skills[s])S.skills[s]=[];});S.earnedBadges=S.earnedBadges||[];S.earnedDates=S.earnedDates||{};saveS();toast('インポート完了');go('home');}catch{toast('エラー：ファイルが無効です');}};r.readAsText(f);}

function _doResetAllData(){
  try{localStorage.removeItem(SKEY);}catch(e){}
  try{localStorage.removeItem(CFG.TIMER_KEY);}catch(e){}
  S={subjects:[...DSUBJ],events:[],sessions:[],decks:[],skills:{},rounds:[],settings:{bg:''},todayMs:0,todayMs_base:0,weekMs:[0,0,0,0,0,0,0],streak:0,lastDate:'',earnedBadges:[],earnedDates:{},_didReset:true};
  DSUBJ.forEach(function(s){S.skills[s]=[];});

}
