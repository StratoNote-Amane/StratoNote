<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,minimum-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="StratoNote">
<meta name="theme-color" content="#76c0ea">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2376c0ea'/%3E%3Ctext y='.9em' font-size='70' x='50%25' text-anchor='middle'%3E%F0%9F%92%AB%3C/text%3E%3C/svg%3E">
<title>💫 StratoNote</title>
<style>
:root{
  --ac:#76c0ea;--ac2:#4aa8d8;--ac3:#99d8ff;--acbg:#eef7fd;--acbr:#c4e4f5;
  --bg:#f4f9fd;--card:#fff;--t1:#1c2a36;--t2:#4a6478;--t3:#8aa4b4;
  --br:#cfe6f4;--ok:#3aaa72;--warn:#e09030;--bad:#d84848;
  --r:14px;--rs:10px;
  --sh:0 2px 12px rgba(76,168,216,.12);--sh2:0 6px 28px rgba(76,168,216,.18);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif;}
body{background:var(--bg);color:var(--t1);}
#bgimg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;display:none;}
#bgimg::after{content:'';position:absolute;inset:0;background:rgba(244,249,253,.86);}
#app{position:relative;z-index:1;display:flex;height:100%;padding-top:var(--st);}
#sb{width:216px;min-width:216px;background:var(--card);border-right:1px solid var(--br);display:flex;flex-direction:column;box-shadow:var(--sh);z-index:20;flex-shrink:0;}
.sbh{padding:18px 16px 13px;background:linear-gradient(150deg,var(--ac2),var(--ac));color:#fff;position:relative;overflow:hidden;}
.sbh::after{content:'✦';position:absolute;right:10px;bottom:6px;font-size:48px;opacity:.12;}
.sbn{font-size:17px;font-weight:800;}.sbs{font-size:10px;opacity:.75;margin-top:2px;}
.sbtm{padding:7px 14px;background:var(--acbg);border-bottom:1px solid var(--br);font-size:11px;color:var(--t2);text-align:center;}
.sbtm b{font-size:15px;color:var(--ac2);display:block;font-variant-numeric:tabular-nums;}
.sbnav{flex:1;overflow-y:auto;padding:5px 0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);border-left:3px solid transparent;transition:.15s;user-select:none;}
.ni:hover{background:var(--acbg);color:var(--ac2);}.ni.on{background:var(--acbg);color:var(--ac2);border-left-color:var(--ac);font-weight:700;}
.ni-ic{width:20px;text-align:center;font-size:14px;flex-shrink:0;}
.sbft{padding:9px 14px;border-top:1px solid var(--br);font-size:11px;color:var(--t3);}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#desk-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px 24px;}
#mob-hd{display:none;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--br);align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh);}
#mob-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--br);z-index:100;padding-bottom:var(--sb);box-shadow:0 -2px 10px rgba(76,168,216,.1);}
.mtrow{display:flex;}.mtab{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 2px 4px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--t3);font-size:9px;font-weight:500;gap:2px;transition:.15s;min-width:0;}
.mtab.on{color:var(--ac2);}.mtic{font-size:18px;line-height:1;}
#mob-ct{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(62px + var(--sb));}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--br);padding:16px;box-shadow:var(--sh);margin-bottom:14px;}
.ct{font-size:10px;font-weight:700;color:var(--ac2);letter-spacing:.7px;text-transform:uppercase;margin-bottom:10px;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.pt{font-size:20px;font-weight:800;}.ps{font-size:11px;color:var(--t3);margin-top:2px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;-webkit-appearance:none;}
.bp{background:var(--ac);color:#fff;}.bp:active{background:var(--ac2);}
.bs{background:var(--acbg);color:var(--ac2);border:1px solid var(--acbr);}
.bd{background:#fdf0f0;color:var(--bad);}
.sm{padding:5px 11px;font-size:12px;border-radius:8px;}.ic{padding:6px;}
input,select,textarea{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--br);background:var(--bg);font-size:14px;color:var(--t1);font-family:inherit;outline:none;transition:.15s;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--ac);background:#fff;}
label{font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;}
.fg{margin-bottom:12px;}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.ba{background:var(--acbg);color:var(--ac2);}.bok{background:#e8f7f0;color:var(--ok);}.bwn{background:#fef5e8;color:var(--warn);}.bbd{background:#fdf0f0;color:var(--bad);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.sc{background:var(--card);border-radius:var(--rs);border:1px solid var(--br);padding:12px;text-align:center;}
.sv{font-size:22px;font-weight:800;color:var(--ac2);}.sl{font-size:10px;color:var(--t3);margin-top:2px;}
/* BADGE SYSTEM */
.badge-icon{font-size:28px;display:block;margin-bottom:4px;}
.badge-card{background:var(--card);border:1.5px solid var(--br);border-radius:12px;padding:12px 10px;text-align:center;box-shadow:var(--sh);}
.badge-card.earned{border-color:var(--ac);background:var(--acbg);}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-end;justify-content:center;}
.mov.on{display:flex;}
.modal{background:var(--card);border-radius:var(--r) var(--r) 0 0;padding:20px 18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + var(--sb));box-shadow:var(--sh2);border-top:2px solid var(--ac);animation:mup .2s ease;}
@keyframes mup{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.mt{font-size:16px;font-weight:800;margin-bottom:16px;}.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
@media(min-width:600px){.mov{align-items:center;}.modal{border-radius:var(--r);max-width:460px;}}
#toast{position:fixed;bottom:calc(70px + var(--sb));left:50%;transform:translateX(-50%) translateY(8px);background:rgba(28,42,54,.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:.25s;z-index:2000;white-space:nowrap;pointer-events:none;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:681px){#toast{bottom:24px;}}
/* CALENDAR */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cdh{text-align:center;font-size:10px;font-weight:600;color:var(--t3);padding:3px 0;}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:3px 1px;border-radius:7px;cursor:pointer;font-size:11.5px;transition:.12s;border:1.5px solid transparent;color:var(--t2);}
.cd:hover{background:var(--acbg);}.cd.today{background:var(--ac);color:#fff;font-weight:800;}.cd.sel{border-color:var(--ac);background:var(--acbg);}.cd.om{opacity:.3;}
.cdts{display:flex;gap:2px;margin-top:1px;}.dot{width:4px;height:4px;border-radius:50%;background:var(--ac);}.dot.h{background:var(--bad);}.dot.m{background:var(--warn);}
.ev{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);background:var(--acbg);border:1px solid var(--br);margin-bottom:6px;}
.ev-bar{width:4px;min-height:36px;border-radius:2px;flex-shrink:0;}
.lb{height:8px;border-radius:4px;background:var(--br);overflow:hidden;margin-top:4px;}
.lbf{height:100%;border-radius:4px;transition:.4s;min-width:4px;}
.tbars{display:flex;gap:4px;align-items:flex-end;height:52px;}
.tbar{flex:1;border-radius:3px 3px 0 0;min-height:5px;}
.tlbls{display:flex;gap:4px;margin-top:4px;}
.tlbl{flex:1;text-align:center;font-size:9px;color:var(--t3);}
/* TIMER */
.tdisp{font-size:72px;font-weight:800;letter-spacing:-3px;font-variant-numeric:tabular-nums;text-align:center;line-height:1;transition:color .3s;color:var(--t1);}
.tdisp.run{color:var(--ac2);}.tdisp.pau{color:var(--warn);}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 12px;border-radius:18px;border:1.5px solid var(--br);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--t2);transition:.12s;}
.chip.on{border-color:var(--ac);background:var(--acbg);color:var(--ac2);}
/* FLASHCARDS */
.fcw{perspective:1000px;max-width:420px;margin:0 auto 16px;}
.fcc{width:100%;aspect-ratio:16/9;position:relative;transform-style:preserve-3d;transition:.45s cubic-bezier(.4,0,.2,1);cursor:pointer;border-radius:var(--r);}
.fcc.flip{transform:rotateY(180deg);}
.fcf{position:absolute;inset:0;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:var(--sh2);}
.fcf-fr{background:linear-gradient(135deg,var(--ac2),var(--ac3));color:#fff;}
.fcf-bk{background:var(--card);transform:rotateY(180deg);border:1px solid var(--br);}
.fclbl{font-size:9px;font-weight:700;opacity:.7;margin-bottom:8px;letter-spacing:1.5px;}
.fctxt{font-size:clamp(14px,4vw,20px);font-weight:700;text-align:center;line-height:1.5;}
.fcprog{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--t2);}
.fcpb{flex:1;height:5px;background:var(--br);border-radius:3px;overflow:hidden;}.fcpf{height:100%;background:var(--ac);transition:.3s;}
.fcbtns{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;}
.fb{padding:10px 18px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.fbok{background:#e8f7f0;color:var(--ok);border:1.5px solid #b0e8cc;}
.fbng{background:#fdf0f0;color:var(--bad);border:1.5px solid #f4c0c0;}
.fbsk{background:var(--acbg);color:var(--t2);border:1.5px solid var(--acbr);}
.dki{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:var(--rs);background:var(--acbg);border:1px solid var(--br);margin-bottom:7px;cursor:pointer;}
/* FC inline add */
.fc-add-bar{background:var(--card);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:12px;}
/* SKILL TREE */
.sktabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.sktab{padding:6px 12px;border-radius:18px;border:1.5px solid var(--br);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--t2);}
.sktab.on{border-color:var(--ac);background:var(--acbg);color:var(--ac2);}
.sk-add-form{display:none;background:var(--acbg);border:1.5px solid var(--ac);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.sk-add-form.on{display:block;}
/* TEST */
.ttabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ttab{padding:6px 12px;border-radius:18px;border:1.5px solid var(--br);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--t2);}
.ttab.on{border-color:var(--ac);background:var(--acbg);color:var(--ac2);}
.trnd{border-radius:var(--rs);border:1px solid var(--br);margin-bottom:10px;overflow:hidden;}
.trnd-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--acbg);cursor:pointer;gap:8px;}
.trnd-n{font-size:13px;font-weight:700;flex:1;}.trnd-b{padding:14px;display:none;}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.srow-lbl{font-size:12px;font-weight:600;color:var(--t2);width:64px;flex-shrink:0;}
.srow-bw{flex:1;height:14px;background:var(--br);border-radius:7px;overflow:hidden;}
.srow-bf{height:100%;border-radius:7px;transition:.4s;}
.srow-v{font-size:11px;font-weight:700;width:52px;text-align:right;flex-shrink:0;}
/* SETTINGS */
.sect{font-size:10px;font-weight:700;color:var(--ac2);letter-spacing:.8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--br);}
.subr{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--br);font-size:13px;}
.subr:last-child{border-bottom:none;}
#offbdg{display:none;position:fixed;top:calc(8px + var(--st));right:8px;z-index:9999;background:var(--warn);color:#fff;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;}
@media(max-width:680px){
  #sb{display:none;}#main{display:none;}
  #mob-hd{display:flex;}#mob-tabs{display:block;}#mob-ct{display:block;}
  #app{flex-direction:column;}
}
@media(min-width:681px){#app{flex-direction:row;}}
</style>
</head>
<body>
<div id="bgimg"></div>
<div id="offbdg">✦ オフライン</div>
<div id="toast"></div>
<div id="app">
<nav id="sb">
  <div class="sbh"><div class="sbn">💫 StratoNote</div><div class="sbs">受験学習管理システム</div></div>
  <div class="sbtm">今日の学習<b id="sbt-d">0:00:00</b></div>
  <div class="sbnav">
    <div class="ni on" data-p="home" onclick="go('home')"><span class="ni-ic">⌂</span>ホーム</div>
    <div class="ni" data-p="study" onclick="go('study')"><span class="ni-ic">◷</span>学習</div>
    <div class="ni" data-p="cal" onclick="go('cal')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">◫</span>カレンダー</div>
    <div class="ni" data-p="tmr" onclick="go('tmr')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">◷</span>タイマー</div>
    <div class="ni" data-p="fc" onclick="go('fc')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">✦</span>暗記カード</div>
    <div class="ni" data-p="sk" onclick="go('sk')"><span class="ni-ic">✧</span>スキルツリー</div>
    <div class="ni" data-p="grades" onclick="go('grades')"><span class="ni-ic">◎</span>成績</div>
    <div class="ni" data-p="an" onclick="go('an')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">◎</span>テスト分析</div>
    <div class="ni" data-p="bdg" onclick="go('bdg')" style="padding-left:28px;font-size:12px"><span class="ni-ic" style="font-size:12px">🏅</span>バッジ</div>
    <div class="ni" data-p="cfg" onclick="go('cfg')"><span class="ni-ic">◉</span>設定</div>
  </div>
  <div class="sbft" id="sbd-str">✦ 0日連続</div>
</nav>
<div id="main"><div id="desk-content"></div></div>
<div id="mob-hd">
  <span style="font-size:15px;font-weight:800;color:var(--ac2)">💫 StratoNote</span>
  <span style="font-size:12px;color:var(--ac2);font-weight:700;font-variant-numeric:tabular-nums" id="sbt-m">0:00:00</span>
</div>
<div id="mob-ct"></div>
<div id="mob-tabs">
  <div class="mtrow">
    <button class="mtab on" data-p="home" onclick="go('home')"><span class="mtic">⌂</span>ホーム</button>
    <button class="mtab" data-p="study" onclick="go('study')"><span class="mtic">◷</span>学習</button>
    <button class="mtab" data-p="sk" onclick="go('sk')"><span class="mtic">✧</span>スキル</button>
    <button class="mtab" data-p="grades" onclick="go('grades')"><span class="mtic">◎</span>成績</button>
    <button class="mtab" data-p="cfg" onclick="go('cfg')"><span class="mtic">◉</span>設定</button>
  </div>
</div>
</div>

<!-- MODALS -->
<div class="mov" id="mev"><div class="modal">
  <div class="mt" id="mev-title">予定を追加</div>
  <div class="fg"><label>タイトル</label><input id="evt" placeholder="例：数学演習"></div>
  <div class="fg"><label>日付</label><input type="date" id="evd"></div>
  <div class="fg"><label>教科</label><select id="evs"></select></div>
  <div class="fg"><label>負荷レベル: <b id="evlv" style="color:var(--ac2)">2</b></label>
    <input type="range" id="evl" min="1" max="5" value="2" oninput="document.getElementById('evlv').textContent=this.value" style="padding:4px 0;border:none;background:none;width:100%"></div>
  <div class="mact"><button class="btn bs" onclick="closeM('mev')">キャンセル</button><button class="btn bp" onclick="saveEv()">保存</button></div>
</div></div>

<div class="mov" id="mdeck"><div class="modal">
  <div class="mt">デッキを作成</div>
  <div class="fg"><label>デッキ名</label><input id="dkn" placeholder="例：英単語 Level 1"></div>
  <div class="fg"><label>教科</label><select id="dks"></select></div>
  <div class="mact"><button class="btn bs" onclick="closeM('mdeck')">キャンセル</button><button class="btn bp" onclick="saveDk()">作成</button></div>
</div></div>

<div class="mov" id="mcard"><div class="modal">
  <div class="mt">カードを追加</div>
  <div class="fg">
    <label>CSV/テキストファイルを読み込む</label>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <button class="btn bs sm" onclick="document.getElementById('xlsf').click()">📂 ファイル選択</button>
      <input type="file" id="xlsf" accept=".csv,.txt,.tsv" style="display:none" onchange="loadCardFile(event)">
    </div>
    <label>貼り付け（問題[Tab or カンマ]答え）</label>
    <textarea id="cbulk" rows="5" placeholder="apple	リンゴ&#10;book	本"></textarea>
  </div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <div class="fg" style="flex:1;margin-bottom:0"><label>問題</label><input id="cq" placeholder="表面"></div>
    <div class="fg" style="flex:1;margin-bottom:0"><label>答え</label><input id="ca" placeholder="裏面"></div>
  </div>
  <div class="mact"><button class="btn bs" onclick="closeM('mcard')">キャンセル</button><button class="btn bp" onclick="saveCards()">追加</button></div>
</div></div>

<div class="mov" id="mrnd"><div class="modal">
  <div class="mt" id="mrnd-title">テストを追加</div>
  <div class="fg"><label>テスト名</label><input id="rnn" placeholder="例：第1回定期考査"></div>
  <div class="fg"><label>種類</label><select id="rntype">
    <option value="考査">定期考査</option><option value="模試">模試</option>
    <option value="小テスト">小テスト</option><option value="その他">その他</option>
  </select></div>
  <div class="fg"><label>日付</label><input type="date" id="rnd"></div>
  <div class="fg"><label>教科（複数可）</label><div class="chips" id="rnchips" style="flex-wrap:wrap;gap:6px;margin-top:4px"></div></div>
  <div class="mact"><button class="btn bs" onclick="closeM('mrnd')">キャンセル</button><button class="btn bp" onclick="nextRnd()">次へ →</button></div>
</div></div>

<div class="mov" id="msc"><div class="modal">
  <div class="mt">点数を入力</div>
  <div style="font-size:12px;color:var(--t2);margin-bottom:12px" id="msc-info"></div>
  <div id="scinps"></div>
  <div class="mact"><button class="btn bs" onclick="closeM('msc')">キャンセル</button><button class="btn bp" onclick="saveRnd()">保存</button></div>
</div></div>

<div class="mov" id="msubj"><div class="modal">
  <div class="mt">教科を追加</div>
  <div class="fg"><label>教科名</label><input id="subjn" placeholder="例：数学II"></div>
  <div class="mact"><button class="btn bs" onclick="closeM('msubj')">キャンセル</button><button class="btn bp" onclick="saveSubj()">追加</button></div>
</div></div>

<script>
// ═══════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════
const SKEY='sn6';
const DSUBJ=['国語','古典','地理','日本史','世界史','公共','数学','物理','化学','生物','英語','情報'];
let S={subjects:[...DSUBJ],events:[],sessions:[],decks:[],skills:{},rounds:[],settings:{bg:''},todayMs:0,weekMs:[0,0,0,0,0,0,0],streak:0,lastDate:'',earnedBadges:[]};
function loadS(){
  try{const d=localStorage.getItem(SKEY);if(d)S=Object.assign({},S,JSON.parse(d));}catch(e){}
  DSUBJ.forEach(s=>{if(!S.skills[s])S.skills[s]=[];});
  S.subjects=S.subjects||[...DSUBJ];
  S.subjects.forEach(s=>{if(!S.skills[s])S.skills[s]=[];});
  S.earnedBadges=S.earnedBadges||[];
  const td=today();
  if(S.lastDate&&S.lastDate!==td){S.todayMs=0;}
}
function saveS(){
  try{
    const json=JSON.stringify(S);
    if(json.length>4500000){toast('⚠ データ容量が大きくなっています。エクスポートを推奨します');}
    localStorage.setItem(SKEY,json);
  }catch(e){toast('⚠ 保存容量が不足しています。背景画像を削除するか、エクスポートしてください');}
}
function today(){return new Date().toISOString().slice(0,10);}
function pad(n){return String(n).padStart(2,'0');}
function fmtMs(ms,f){const t=Math.floor((ms||0)/1e3),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return f?pad(h)+':'+pad(m)+':'+pad(s):h+'h'+pad(m)+'m';}
function fmtMsClock(ms){const t=Math.floor((ms||0)/1e3),h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return pad(h)+':'+pad(m)+':'+pad(s);}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
let curP='home';
const isMob=()=>window.innerWidth<=680;
function getC(){return isMob()?document.getElementById('mob-ct'):document.getElementById('desk-content');}
function go(p){
  curP=p;
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('on',el.getAttribute('data-p')===p));
  // Mobile tabs: highlight parent tab for sub-pages
  const mobParent={'cal':'study','tmr':'study','fc':'study','an':'grades','bdg':'grades'};
  const activeTab=mobParent[p]||p;
  document.querySelectorAll('.mtab').forEach(el=>el.classList.toggle('on',el.getAttribute('data-p')===activeTab));
  const c=getC();if(!c)return;
  c.innerHTML=genP(p);
  setTimeout(()=>postRender(p),30);
}
function genP(p){
  if(p==='home')return pHome();
  if(p==='study')return pStudy();
  if(p==='cal')return pCal();if(p==='tmr')return pTmr();
  if(p==='fc')return pFC();if(p==='sk')return pSK();
  if(p==='grades')return pGrades();
  if(p==='an')return pAn();if(p==='bdg')return pBadge();if(p==='cfg')return pCfg();
  return '';
}
function postRender(p){
  if(p==='cal')renderCalGrid();
  if(p==='sk')renderSKTree();
  if(p==='an'){renderAnOverall();renderAnSubj();}
}
let lastMob=isMob();
window.addEventListener('resize',()=>{
  const nm=isMob();
  if(nm!==lastMob){lastMob=nm;go(curP);}
  // 画面が小さくなっても最低限の幅を確保（zoom-out防止は viewport meta で対応済み）
});

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
let editEvIdx=-1,editRndIdx=-1;
function openM(id){fillSels();if(id==='mev'){document.getElementById('evd').value=selDate||today();}if(id==='mrnd')buildRndChips();document.getElementById(id).classList.add('on');}
function closeM(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.mov').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('on');}));
function fillSels(){
  ['evs','dks'].forEach(id=>{const el=document.getElementById(id);if(!el)return;const pv=el.value;el.innerHTML=(S.subjects||[]).map(s=>`<option value="${s}">${s}</option>`).join('');if(pv)el.value=pv;});
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastT;
function toast(msg){const t=document.getElementById('toast');clearTimeout(toastT);t.textContent=msg;t.classList.add('on');toastT=setTimeout(()=>t.classList.remove('on'),2600);}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function scolor(s){const m={'国語':'#c0392b','古典':'#d35400','地理':'#27ae60','日本史':'#8e44ad','世界史':'#6c3483','公共':'#16a085','数学':'#2471a3','物理':'#1a5276','化学':'#117a65','生物':'#1e8449','英語':'#d4ac0d','情報':'#5d6d7e'};return m[s]||'#76c0ea';}
function lcolor(v){return v>=8?'var(--bad)':v>=4?'var(--warn)':'var(--ok)';}
function calcLoad(ds){const ev=(S.events||[]).filter(e=>e.date===ds).reduce((a,e)=>a+(e.load||1),0);const ses=Math.round((S.sessions||[]).filter(s=>new Date(s.ts).toISOString().slice(0,10)===ds).reduce((a,s)=>a+s.dur,0)/900000);return ev+ses;}
function wkDates(){const dow=new Date().getDay(),d=new Date();return Array.from({length:7},(_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()-dow+i);return dd.toISOString().slice(0,10);});}
function trendBarsHTML(lds){
  const days=['日','月','火','水','木','金','土'],dow=new Date().getDay();
  const mx=Math.max(...lds,1);
  const bars=lds.map((l,i)=>`<div class="tbar" style="flex:1;height:${Math.round(l/mx*46)+5}px;background:${i===dow?'var(--ac)':lcolor(l)};opacity:${i===dow?1:.65};border-radius:3px 3px 0 0"></div>`).join('');
  const lbls=days.map((d,i)=>`<div class="tlbl" style="flex:1;text-align:center;font-size:9px;color:${i===dow?'var(--ac2)':'var(--t3)'}">${d}</div>`).join('');
  return`<div class="tbars">${bars}</div><div class="tlbls">${lbls}</div>`;
}
function updTime(){
  const ts=fmtMsClock(S.todayMs);
  ['sbt-d','sbt-m'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=ts;});
  const tt=document.getElementById('t-today-disp');if(tt)tt.textContent=ts;
}

// ═══════════════════════════════════════════
// HUB PANELS (study + grades)
// ═══════════════════════════════════════════
function pStudy(){
  return`<div class="ph"><div class="pt">◷ 学習</div></div>
<div onclick="go('cal')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:16px;padding:18px">
  <span style="font-size:32px">◫</span><div><div style="font-size:16px;font-weight:700">カレンダー</div><div style="font-size:12px;color:var(--t3);margin-top:2px">学習計画・負荷管理</div></div><span style="margin-left:auto;color:var(--ac2)">›</span>
</div>
<div onclick="go('tmr')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:16px;padding:18px">
  <span style="font-size:32px">◷</span><div><div style="font-size:16px;font-weight:700">タイマー</div><div style="font-size:12px;color:var(--t3);margin-top:2px">学習時間の記録</div></div><span style="margin-left:auto;color:var(--ac2)">›</span>
</div>
<div onclick="go('fc')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:16px;padding:18px">
  <span style="font-size:32px">✦</span><div><div style="font-size:16px;font-weight:700">暗記カード</div><div style="font-size:12px;color:var(--t3);margin-top:2px">フラッシュカード学習</div></div><span style="margin-left:auto;color:var(--ac2)">›</span>
</div>`;
}
function pGrades(){
  const rounds=S.rounds||[];const badges=S.earnedBadges||[];
  return`<div class="ph"><div class="pt">◎ 成績</div></div>
<div onclick="go('an')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:16px;padding:18px">
  <span style="font-size:32px">◎</span><div><div style="font-size:16px;font-weight:700">テスト分析</div><div style="font-size:12px;color:var(--t3);margin-top:2px">${rounds.length}件記録済み</div></div><span style="margin-left:auto;color:var(--ac2)">›</span>
</div>
<div onclick="go('bdg')" class="card" style="cursor:pointer;display:flex;align-items:center;gap:16px;padding:18px">
  <span style="font-size:32px">🏅</span><div><div style="font-size:16px;font-weight:700">バッジ</div><div style="font-size:12px;color:var(--t3);margin-top:2px">${badges.length}/${BADGE_DEFS.length} 獲得済み</div></div><span style="margin-left:auto;color:var(--ac2)">›</span>
</div>`;
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function pHome(){
  const n=new Date();
  const comp=Object.values(S.skills).reduce((a,arr)=>a+arr.filter(sk=>sk.status==='done').length,0);
  const lds=wkDates().map(calcLoad);const tld=lds[n.getDay()],wld=lds.reduce((a,b)=>a+b,0);
  const evs=(S.events||[]).filter(e=>e.date===today());
  const evH=evs.length?evs.map(e=>`<div class="ev"><div class="ev-bar" style="background:${scolor(e.subj)}"></div><div><div style="font-size:13px;font-weight:600">${e.title}</div><div style="font-size:11px;color:var(--t3)">${e.subj} ${'★'.repeat(e.load||1)}</div></div></div>`).join(''):'<div style="color:var(--t3);font-size:12px;text-align:center;padding:10px">予定なし</div>';
  const ws=new Date();ws.setDate(ws.getDate()-ws.getDay());const we=new Date(ws);we.setDate(ws.getDate()+6);
  const sd={};(S.sessions||[]).filter(s=>{const d=new Date(s.ts);return d>=ws&&d<=we;}).forEach(s=>{sd[s.subj]=(sd[s.subj]||0)+s.dur;});
  const tot=Object.values(sd).reduce((a,b)=>a+b,0)||1;
  const balH=!Object.keys(sd).length?'<div style="font-size:12px;color:var(--t3)">まだ記録なし</div>':Object.entries(sd).sort((a,b)=>b[1]-a[1]).map(([subj,ms])=>{const p=Math.round(ms/tot*100),h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="font-weight:700">${subj}</span><span style="color:var(--t3)">${h}h${m}m (${p}%)</span></div><div class="lb"><div class="lbf" style="width:${p}%;background:${scolor(subj)}"></div></div></div>`;}).join('');
  // Recent badges
  const recent=BADGE_DEFS.filter(b=>S.earnedBadges.includes(b.id)).slice(-3);
  const badgeH=recent.length?recent.map(b=>`<span title="${b.name}" style="font-size:22px">${b.icon}</span>`).join(''):'<span style="font-size:12px;color:var(--t3)">まだバッジなし</span>';
  return`<div class="ph"><div><div class="pt">💫 ホーム</div><div class="ps">${n.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}</div></div><div class="bdg ba">✦ ${S.streak||0}日連続</div></div>
<div class="stats"><div class="sc"><div class="sv">${fmtMsClock(S.todayMs)}</div><div class="sl">今日</div></div><div class="sc"><div class="sv">${Math.round((S.weekMs||[]).reduce((a,b)=>a+b,0)/3600000)}h</div><div class="sl">今週</div></div><div class="sc"><div class="sv">${comp}</div><div class="sl">習得スキル</div></div></div>
<div class="card" style="border-color:var(--ac)"><div class="ct">今週の学習負荷トレンド</div>${trendBarsHTML(lds)}<div style="margin-top:8px;display:flex;gap:16px;font-size:11px;color:var(--t2)"><span>今日: <b style="color:var(--ac2)">${tld}</b></span><span>今週: <b style="color:var(--ac2)">${wld}</b></span></div></div>
<div class="card"><div class="ct">今日の予定</div>${evH}</div>
<div class="card"><div class="ct">教科別バランス（今週）</div>${balH}</div>
<div class="card" onclick="go('bdg')" style="cursor:pointer"><div class="ct">獲得バッジ</div><div style="display:flex;gap:10px;align-items:center">${badgeH}<span style="font-size:11px;color:var(--t3);margin-left:auto">${S.earnedBadges.length}/${BADGE_DEFS.length} →</span></div></div>`;
}

// ═══════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════
let selDate=today(),calY=new Date().getFullYear(),calM=new Date().getMonth();
function pCal(){
  return`<div class="ph"><div style="display:flex;align-items:center;gap:8px"><button class="btn bs sm" onclick="go('study')" style="padding:5px 10px">← 学習</button><div><div class="pt">◫ カレンダー</div><div class="ps">学習計画・負荷管理</div></div></div><div style="display:flex;gap:6px"><button class="btn bs sm" onclick="openM('msubj')">＋ 教科</button><button class="btn bp sm" onclick="openEvModal()">＋ 追加</button></div></div>
<div class="card" style="padding:12px">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><button class="btn bs sm" onclick="calNav(-1)">◀</button><b id="callbl" style="font-size:14px"></b><button class="btn bs sm" onclick="calNav(1)">▶</button></div>
<div class="cg" style="margin-bottom:3px"><div class="cdh" style="color:#d04848">日</div><div class="cdh">月</div><div class="cdh">火</div><div class="cdh">水</div><div class="cdh">木</div><div class="cdh">金</div><div class="cdh" style="color:#4a80c8">土</div></div>
<div class="cg" id="calgrid"></div></div>
<div class="card">
<div class="ct" id="caldlbl">選択日</div>
<div id="calevs"></div>
<div style="margin-top:12px"><div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--t2);margin-bottom:6px"><span>この日の負荷（予定＋学習）</span><span class="bdg" id="callbdg">0</span></div><div class="lb" style="height:10px"><div class="lbf" id="callbf" style="width:0%;background:var(--ok)"></div></div></div></div>
<div class="card"><div class="ct">週間負荷トレンド</div>${trendBarsHTML(wkDates().map(calcLoad))}</div>`;
}
function renderCalGrid(){
  const e=document.getElementById('callbl');if(!e)return;
  e.textContent=calY+'年'+(calM+1)+'月';
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0);
  const g=document.getElementById('calgrid');if(!g)return;
  g.innerHTML='';
  for(let i=0;i<first.getDay();i++){const el=document.createElement('div');el.className='cd om';el.textContent=new Date(calY,calM,-first.getDay()+i+1).getDate();g.appendChild(el);}
  for(let d=1;d<=last.getDate();d++){
    const ds=calY+'-'+pad(calM+1)+'-'+pad(d);
    const el=document.createElement('div');
    el.className='cd'+(ds===today()?' today':'')+(ds===selDate&&ds!==today()?' sel':'');
    el.textContent=d;
    const evs=(S.events||[]).filter(ev=>ev.date===ds);
    if(evs.length){const cw=document.createElement('div');cw.className='cdts';evs.slice(0,3).forEach(ev=>{const dot=document.createElement('div');dot.className='dot'+(ev.load>=4?' h':ev.load>=3?' m':'');cw.appendChild(dot);});el.appendChild(cw);}
    el.onclick=()=>{selDate=ds;renderCalGrid();renderCalDay();};
    g.appendChild(el);
  }
  renderCalDay();
}
function renderCalDay(){
  const evs=(S.events||[]).filter(e=>e.date===selDate);
  const dp=selDate.split('-');
  const dl=document.getElementById('caldlbl');if(dl)dl.textContent=dp[0]+'年'+parseInt(dp[1])+'月'+parseInt(dp[2])+'日';
  const cel=document.getElementById('calevs');if(!cel)return;
  cel.innerHTML=evs.length?evs.map((e,i)=>`<div class="ev"><div class="ev-bar" style="background:${scolor(e.subj)};min-height:36px;height:auto"></div><div style="flex:1"><div style="font-size:13px;font-weight:600">${e.title}</div><div style="font-size:11px;color:var(--t3)">${e.subj} ${'★'.repeat(e.load||1)}</div></div><div style="display:flex;gap:6px"><button class="btn bs sm ic" onclick="editEv(${i})" style="padding:5px 8px">✎</button><button class="btn bd sm ic" onclick="delEv(${i})" style="padding:5px 8px">✕</button></div></div>`).join(''):'<div style="color:var(--t3);font-size:12px;text-align:center;padding:10px">予定なし</div>';
  const load=calcLoad(selDate);
  const pct=Math.min(100,Math.max(load*8,load>0?10:0));
  const lbf=document.getElementById('callbf');
  if(lbf){lbf.style.width=pct+'%';lbf.style.background=lcolor(load);}
  const lbdg=document.getElementById('callbdg');
  if(lbdg){lbdg.textContent='負荷 '+load;lbdg.className='bdg '+(load>=8?'bbd':load>=4?'bwn':'bok');}
}
function calNav(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCalGrid();}
function openEvModal(idx=-1){
  editEvIdx=idx;
  const title=document.getElementById('mev-title');
  const evd=document.getElementById('evd');
  const evt=document.getElementById('evt');
  const evl=document.getElementById('evl');
  const evlv=document.getElementById('evlv');
  if(idx>=0){
    const dayEvs=(S.events||[]).filter(e=>e.date===selDate);
    const ev=dayEvs[idx];
    if(ev){title.textContent='予定を編集';evt.value=ev.title;evd.value=ev.date;evl.value=ev.load||2;evlv.textContent=ev.load||2;fillSels();document.getElementById('evs').value=ev.subj;}
  }else{title.textContent='予定を追加';evt.value='';evd.value=selDate||today();evl.value=2;evlv.textContent=2;}
  openM('mev');
}
function saveEv(){
  const t=document.getElementById('evt').value.trim();if(!t){toast('タイトルを入力してください');return;}
  const ev={title:t,date:document.getElementById('evd').value,subj:document.getElementById('evs').value,load:parseInt(document.getElementById('evl').value)};
  if(editEvIdx>=0){
    const dayEvs=(S.events||[]).filter(e=>e.date===selDate);
    const gi=S.events.indexOf(dayEvs[editEvIdx]);
    if(gi>=0)S.events[gi]=ev;
    editEvIdx=-1;
  }else{S.events.push(ev);}
  saveS();closeM('mev');toast('✅ 予定を保存');if(curP==='cal')renderCalGrid();else if(curP==='home')go('home');
}
function editEv(i){openEvModal(i);}
function delEv(i){const evs=(S.events||[]).filter(e=>e.date===selDate);const gi=S.events.indexOf(evs[i]);if(gi!==-1)S.events.splice(gi,1);saveS();renderCalGrid();renderCalDay();toast('削除しました');}

// ═══════════════════════════════════════════
// TIMER — 開始/終了時刻記録方式
// ═══════════════════════════════════════════
let tRun=false,tMs=0,tStart=0,tIv=null,tSubj='',tCnt=0;
function pTmr(){
  const chips=(S.subjects||[]).map(s=>`<div class="chip${s===tSubj?' on':''}" onclick="selTS(this,'${s.replace(/'/g,"\\'")}')"> ${s}</div>`).join('');
  return`<div class="ph"><div style="display:flex;align-items:center;gap:8px"><button class="btn bs sm" onclick="go('study')" style="padding:5px 10px;margin-right:6px">← 学習</button><div class="pt">◷ タイマー</div></div></div>
<div class="card"><div class="ct">教科を選択</div><div class="chips" id="tchips">${chips}</div></div>
<div class="card" style="text-align:center">
  <div class="tdisp ${tRun?'run':tMs>0?'pau':''}" id="tdisp" style="padding:28px 0 8px">${fmtMsClock(tMs)}</div>
  <div style="font-size:12px;color:var(--t3);margin-bottom:20px" id="tslbl">${tSubj||'教科を選択'}</div>
  <button onclick="toggleT()" id="tbtn" style="width:72px;height:72px;border-radius:50%;border:none;font-size:28px;cursor:pointer;background:${tRun?'var(--warn)':'var(--ac)'};color:#fff;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(76,168,216,.3)">${tRun?'⏸':'▶'}</button>
  <div style="margin-top:16px;font-size:13px;color:var(--t2)">今日の累積: <b id="t-today-disp" style="color:var(--ac2);font-size:16px">${fmtMsClock(S.todayMs)}</b></div>
  <div style="margin-top:6px;font-size:11px;color:var(--t3)">⏸ 停止で自動記録 · バックグラウンドでも継続</div>
</div>`;
}
function selTS(el,s){tSubj=s;document.querySelectorAll('#tchips .chip').forEach(c=>c.classList.toggle('on',c===el));const l=document.getElementById('tslbl');if(l)l.textContent=s;}
function toggleT(){
  if(tRun){
    // STOP: record session using start timestamp stored in localStorage
    tRun=false;clearInterval(tIv);
    const elapsed=Date.now()-tStart;
    tMs=elapsed;
    if(tMs>4000)saveSess();
    try{localStorage.removeItem('sn6_timer_start');}catch(e){}
  }else{
    // START: store start time in localStorage so it persists if app closes
    tRun=true;tStart=Date.now()-tMs;tIv=setInterval(tickT,500);
    try{localStorage.setItem('sn6_timer_start',JSON.stringify({ts:tStart,subj:tSubj}));}catch(e){}
  }
  const btn=document.getElementById('tbtn');
  if(btn){btn.textContent=tRun?'⏸':'▶';btn.style.background=tRun?'var(--warn)':'var(--ac)';}
  const disp=document.getElementById('tdisp');
  if(disp)disp.className='tdisp '+(tRun?'run':tMs>0?'pau':'');
}
function tickT(){

let curDk=-1,fcQueue=[],fcQIdx=0,fcFlipped=false,fcStudyMode='all',fcDirection='normal';
function isDue(c){if(!c.lastReview)return true;const t=(Date.now()-c.lastReview)/86400000;const st=c.stability||1;return Math.exp(-t/st)<0.7;}// R<70% = due
function isNew2(c){return!c.reps||c.reps===0;}
function buildFCQ(cards){
  let arr;
  if(fcStudyMode==='rec')arr=cards.filter(isDue);
  else if(fcStudyMode==='new')arr=cards.filter(isNew2);
  else arr=[...cards];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function rateFC(result){
  if(fcQIdx>=fcQueue.length)return;
  const card=fcQueue[fcQIdx];
  const real=((S.decks[curDk]&&S.decks[curDk].cards)||[]).find(c=>c.q===card.q&&c.a===card.a);

    if(result==='ok'){st=st*(1.8+0.1*(real.reps||1));}else{st=Math.max(1,st*0.3);}

const SK_SUBJ=['国語','古典','地理','日本史','世界史','公共','数学','物理','化学','生物','英語','情報'];

<div style="border:1px solid var(--br);border-radius:var(--r);background:#fafcff;overflow:auto;-webkit-overflow-scrolling:touch;min-height:200px">
<div id="sksvg" style="display:inline-block;min-width:100%"></div></div>`;

function selSKS(el,s){curSKS=s;document.querySelectorAll('.sktab').forEach(t=>t.classList.toggle('on',t.textContent.trim()===s));skFormParentId=null;closeSkForm();renderSKTree();}

function addSkill(){

function delSkill(id){

  var idx=skills.findIndex(function(s){return s.id===id;});if(idx<0)return;

// Check if ALL ancestors are done
function allAncestorsDone(id,im){
  const sk=im[id];if(!sk)return true;
  if(!sk.preId)return true;
  const pre=im[sk.preId];
  if(!pre||pre.status!=='done')return false;
  return allAncestorsDone(sk.preId,im);
}
function toggleSK2(id){
  const skills=S.skills[curSKS];if(!skills)return;
  const im={};skills.forEach(s=>im[s.id]=s);
  const sk=im[id];if(!sk)return;
  if(sk.status!=='done'){
    // Trying to complete: check all ancestors
    if(!allAncestorsDone(id,im)){toast('前提スキルがすべて完了していません');return;}
  }else{
    // Uncompleting: also uncheck all descendants
    const uncheck=(nid)=>{skills.filter(s=>s.preId===nid).forEach(child=>{if(child.status==='done'){child.status='open';uncheck(child.id);}});};
    uncheck(id);
  }
  sk.status=sk.status==='done'?'open':'done';
  saveS();renderSKTree();checkBadges();toast(sk.status==='done'?'✅ 習得！':'↩ 未完了に戻しました');
}
function renderSKTree(){
  var skills=S.skills[curSKS]||[];
  var wrap=document.getElementById('sksvg');if(!wrap)return;
  if(!skills.length){
    wrap.innerHTML='<div style="text-align:center;padding:32px;color:var(--t3)"><div style="font-size:28px;margin-bottom:8px">&#10022;</div>'
      +'<div style="font-size:13px;font-weight:600">スキルがありません</div>'
      +'<div style="margin-top:10px"><button class="btn bp sm" onclick="openSkForm(null)">+ 最初のスキルを追加</button></div></div>';
    return;
  }
  var im={};skills.forEach(function(s){im[s.id]=s;});
  var ch={};skills.forEach(function(s){if(s.preId&&im[s.preId]){ch[s.preId]=ch[s.preId]||[];ch[s.preId].push(s.id);}});
  var roots=skills.filter(function(s){return!s.preId||!im[s.preId];});
  // BFS level assignment
  var lv={};var bfsQ=roots.map(function(r){return{id:r.id,l:0};});var vis=new Set();
  while(bfsQ.length){var cur=bfsQ.shift();if(vis.has(cur.id))continue;vis.add(cur.id);lv[cur.id]=cur.l;(ch[cur.id]||[]).forEach(function(cid){bfsQ.push({id:cid,l:cur.l+1});});}
  skills.forEach(function(s){if(lv[s.id]===undefined)lv[s.id]=0;});
  var NW=108,NH=40,VG=64,HG=10;
  var MARGIN=28; // left margin for del buttons - NO negative viewBox
  function sw(id){var c=ch[id]||[];if(!c.length)return NW+HG;return c.reduce(function(s,x){return s+sw(x);},0);}
  var roots2=skills.filter(function(s){return!s.preId||!im[s.preId];});
  var totalRW=roots2.reduce(function(s,r){return s+sw(r.id);},0);
  var canW=Math.max(340,totalRW+40);
  var pos={};
  function place(id,cx,y){
    var c=ch[id]||[];
    pos[id]={x:cx-NW/2+MARGIN,y:y};
    if(!c.length)return;
    var tot=c.reduce(function(s,x){return s+sw(x);},0);
    var ox=cx-tot/2;
    c.forEach(function(cid){var w=sw(cid);place(cid,ox+w/2,y+NH+VG);ox+=w;});
  }
  var ox2=20;roots2.forEach(function(r){var w=sw(r.id);place(r.id,ox2+w/2,20);ox2+=w;});
  var maxY=0;Object.values(pos).forEach(function(p){if(p.y>maxY)maxY=p.y;});
  var H=maxY+NH+40;
  var W=canW+MARGIN+32;
  var edges='',nodes='';
  // Edges
  skills.forEach(function(sk){
    if(!sk.preId||!pos[sk.preId]||!pos[sk.id])return;
    var pp=pos[sk.preId],cp=pos[sk.id];
    var x1=pp.x+NW/2,y1=pp.y+NH,x2=cp.x+NW/2,y2=cp.y,midy=(y1+y2)/2;
    var isDone=allAncestorsDone(sk.id,im)&&im[sk.preId]&&im[sk.preId].status==='done';
    edges+='<path d="M'+x1+','+y1+' C'+x1+','+midy+' '+x2+','+midy+' '+x2+','+y2+'"'
      +' fill="none" stroke="'+(isDone?'#76c0ea':'#c4e4f5')+'"'
      +' stroke-width="'+(isDone?2:1.5)+'"'
      +(isDone?'':' stroke-dasharray="5,4"')+'/>';
  });
  // Nodes
  skills.forEach(function(sk){
    var p=pos[sk.id];if(!p)return;
    var unlocked=allAncestorsDone(sk.id,im);
    var done=sk.status==='done',locked=!unlocked;
    var fill,stroke,tc;
    if(done){fill='#76c0ea';stroke='#4aa8d8';tc='#fff';}
    else if(locked){fill='#f0f4f8';stroke='#c4e4f5';tc='#8aa4b4';}
    else{fill='#fff';stroke='#76c0ea';tc='#1c2a36';}
    var nm=sk.name.length>13?sk.name.slice(0,12)+'\u2026':sk.name;
    var r=14; // button radius - larger hit area
    var plusCx=p.x+NW+6+r; // + button center X
    var delCx=p.x-6-r;     // x button center X - LEFT of node, within canvas (MARGIN ensures space)
    var btnCy=p.y+NH/2;

    nodes+='<g data-action="toggle" data-id="'+sk.id+'" style="cursor:pointer">'
      +'<rect x="'+p.x+'" y="'+p.y+'" width="'+NW+'" height="'+NH+'" rx="8"'
      +' fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(done?2:1.5)+'"/>'
      +(done?'<text x="'+(p.x+NW-10)+'" y="'+(p.y+11)+'" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#fff">\u2713</text>':'')
      +(locked

        :'<text x="'+(p.x+NW/2)+'" y="'+(p.y+NH/2)+'" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="'+tc+'">'+nm+'</text>'
      )
      +'</g>';
    // + button (add child)
    nodes+='<g data-action="plus" data-id="'+sk.id+'" style="cursor:pointer">'
      +'<circle cx="'+plusCx+'" cy="'+btnCy+'" r="'+r+'" fill="#eef7fd" stroke="#76c0ea" stroke-width="1.5"/>'
      +'<text x="'+plusCx+'" y="'+btnCy+'" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="#4aa8d8">+</text>'
      +'</g>';
    // ✕ delete button (left side, within canvas thanks to MARGIN)
    nodes+='<g data-action="del" data-id="'+sk.id+'" style="cursor:pointer">'
      +'<circle cx="'+delCx+'" cy="'+btnCy+'" r="'+r+'" fill="#fdf0f0" stroke="#f4b8b8" stroke-width="1.5"/>'
      +'<text x="'+delCx+'" y="'+btnCy+'" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#d84848">\u00d7</text>'
      +'</g>';
  });
  // SVG: no negative viewBox
  wrap.innerHTML='<svg width="'+W+'" height="'+H
    +'" viewBox="0 0 '+W+' '+H
    +'" xmlns="http://www.w3.org/2000/svg" style="display:block;min-width:'+W+'px">'+edges+nodes+'</svg>';
  // Event delegation on the SVG itself
  var svg=wrap.querySelector('svg');
  if(!svg)return;
  // Per-element listeners (avoids closest() SVG compatibility issues)
  wrap.querySelectorAll('g[data-action="toggle"]').forEach(function(g){
    var id=g.getAttribute('data-id');
    g.addEventListener('click',function(e){e.stopPropagation();toggleSK2(id);});

  wrap.querySelectorAll('g[data-action="del"]').forEach(function(g){
    var id=g.getAttribute('data-id');
    g.addEventListener('click',function(e){e.stopPropagation();e.preventDefault();delSkill(id);});
  });
}

let tmpRnd=null,rndSubjs=[],curTType='全て';

    var oa=Math.round(avgs.reduce(function(a,b){return a+b;},0)/avgs.length);

      var diffStr=diff>0?'+'+diff+'%':diff<0?diff+'%':'±0%';
      var diffC=diff>0?'var(--ok)':diff<0?'var(--bad)':'var(--t3)';
      var devAvg=arr.filter(function(x){return x.dev!=null;}).map(function(x){return x.dev;});
      var devStr=devAvg.length?Math.round(devAvg.reduce(function(a,b){return a+b;},0)/devAvg.length)+'':'−';
      return'<tr style="border-bottom:1px solid var(--br)">'

    if(rows)subjStatsHtml='<div class="card"><div class="ct">教科別成績サマリー</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:2px solid var(--br)"><th style="padding:6px;text-align:left;font-size:10px;color:var(--t3)">教科</th><th style="padding:6px;text-align:center;font-size:10px;color:var(--t3)">回数</th><th style="padding:6px;text-align:center;font-size:10px;color:var(--t3)">平均</th><th style="padding:6px;text-align:center;font-size:10px;color:var(--t3)">初回比</th><th style="padding:6px;text-align:center;font-size:10px;color:var(--t3)">平均偏差値</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';

    var srows=Object.entries(r.scores||{}).map(function(kv){var subj=kv[0],sc=kv[1];var pct=sc.max>0?Math.round(sc.score/sc.max*100):0;var c=pct>=80?'var(--ok)':pct>=60?'var(--warn)':'var(--bad)';return'<div class="srow"><div class="srow-lbl">'+subj+'</div><div class="srow-bw"><div class="srow-bf" style="width:'+pct+'%;background:'+c+'"></div></div><div class="srow-v" style="color:'+c+'">'+sc.score+'/'+sc.max+(sc.dev!=null?'<br><span style="font-size:9px;color:var(--t3)">偏'+sc.dev+'</span>':'')+'</div></div>';}).join('');
    var idx=S.rounds.indexOf(r);
    return'<div class="trnd"><div class="trnd-h" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">'
      +'<div style="flex:1"><div class="trnd-n"><span style="background:var(--acbg);color:var(--ac2);border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;margin-right:5px">'+(r.type||'その他')+'</span>'+r.name+'</div>'

    +'<div class="ttabs">'+tabsH+'</div>'
    +sumHtml+subjStatsHtml

    +listH;
}

function drawLineChart(ctx,W,H,datasets,labels,colors,names){
  ctx.clearRect(0,0,W,H);
  var n=labels.length;if(!n)return;
  var legH=(names&&names.length>1)?Math.min(names.length,8)*14+8:0;
  var pd={t:20,r:14,b:32,l:38};
  var gW=W-pd.l-pd.r;
  var gH=H-pd.t-pd.b-legH;
  if(gW<=0||gH<=0)return;
  var allVals=[];
  datasets.forEach(function(d){d.forEach(function(v){if(v!=null)allVals.push(v);});});
  if(!allVals.length)return;
  var mn=Math.max(0,Math.min.apply(null,allVals)-10);
  var mx=Math.min(100,Math.max.apply(null,allVals)+10);
  if(mx-mn<10){mn=Math.max(0,mn-5);mx=Math.min(100,mx+5);}
  var rng=mx-mn||1;
  // Grid
  ctx.strokeStyle='#cfe6f4';ctx.lineWidth=0.5;
  [0,20,40,60,80,100].forEach(function(v){
    if(v<mn||v>mx)return;
    var y=pd.t+gH-((v-mn)/rng*gH);
    ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(W-pd.r,y);ctx.stroke();
    ctx.fillStyle='#8aa4b4';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(v,pd.l-3,y+3);
  });
  // X labels
  labels.forEach(function(lb,i){
    var x=pd.l+(n===1?gW/2:i/(n-1)*gW);
    ctx.fillStyle='#8aa4b4';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(lb,x,H-legH-4);
  });
  // Lines
  datasets.forEach(function(data,di){
    var color=colors[di]||'#76c0ea';
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';
    var started=false;
    data.forEach(function(v,i){
      if(v===null){started=false;return;}
      var x=pd.l+(n===1?gW/2:i/(n-1)*gW);
      var y=pd.t+gH-((v-mn)/rng*gH);
      if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Fill for single dataset
    if(datasets.length===1){
      ctx.save();
      var grad=ctx.createLinearGradient(0,pd.t,0,pd.t+gH);
      grad.addColorStop(0,color+'40');grad.addColorStop(1,color+'05');
      ctx.beginPath();
      var pts=data.map(function(v,i){return v!=null?{x:pd.l+(n===1?gW/2:i/(n-1)*gW),y:pd.t+gH-((v-mn)/rng*gH)}:null;}).filter(Boolean);
      if(pts.length>=2){
        ctx.moveTo(pts[0].x,pd.t+gH);
        pts.forEach(function(p){ctx.lineTo(p.x,p.y);});
        ctx.lineTo(pts[pts.length-1].x,pd.t+gH);
        ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      }
      ctx.restore();
    }
    // Dots + values
    data.forEach(function(v,i){
      if(v===null)return;
      var x=pd.l+(n===1?gW/2:i/(n-1)*gW);
      var y=pd.t+gH-((v-mn)/rng*gH);
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle=color;ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      var vc=v>=80?'#3aaa72':v>=60?'#e09030':'#d84848';
      ctx.fillStyle=vc;ctx.font='bold 9px sans-serif';ctx.textAlign='center';
      ctx.fillText(v+'%',x,y-8);
    });
    // Legend
    if(names&&names.length>1&&legH>0){
      var ly=H-legH+di*14+7;
      if(ly<H){
        ctx.fillStyle=color;ctx.fillRect(pd.l,ly-4,14,8);
        ctx.fillStyle='#4a6478';ctx.font='10px sans-serif';ctx.textAlign='left';
        ctx.fillText(names[di].slice(0,6),pd.l+18,ly+3);
      }
    }
  });
}
