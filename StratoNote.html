// [render] renderAnSubj
function renderAnSubj() {
  var rounds = (S.rounds || [])
    .filter(function(r){ return (r.type || 'その他') === curTType; })
    .slice().sort(function(a, b){ return a.date.localeCompare(b.date); });

  var cv = document.getElementById('an-subj');
  if (!cv) return;

  // データ構築
  var bySubj = {};
  rounds.forEach(function(r) {
    Object.entries(r.scores || {}).forEach(function(kv) {
      var subj = kv[0], sc = kv[1];
      if (!bySubj[subj]) bySubj[subj] = [];
      bySubj[subj].push({date: r.date, pct: calcSubjPct(sc)});
    });
  });
  var subjKeys = Object.keys(bySubj);
  if (!subjKeys.length) { cv.style.display = 'none'; return; }
  cv.style.display = 'block';

  var allDates = [...new Set(rounds.map(function(r){ return r.date; }))].sort();
  var datasets = subjKeys.map(function(subj) {
    return allDates.map(function(d) {
      var e = bySubj[subj].find(function(x){ return x.date === d; });
      return e ? e.pct : null;
    });
  });
  var colors = subjKeys.map(function(s){ return scolor(s); });
  var labels  = allDates.map(function(d){ return d.slice(5); });

  // ── 通常Canvas: 数値なし・タップで拡大モーダルを開く ─────────────
  var dpr = window.devicePixelRatio || 1;
  var W = cv.offsetWidth || window.innerWidth - 36;
  cv.width = W * dpr; cv.height = 240 * dpr;
  cv.style.width = W + 'px'; cv.style.height = '240px';
  var ctx = cv.getContext('2d'); ctx.scale(dpr, dpr);
  drawLineChart(ctx, W, 240, datasets, labels, colors, subjKeys, false, null);

  cv.onclick = function() { openAnZoom(datasets, labels, colors, subjKeys); };
}

/**
 * 拡大モーダルを開く。
 * ドットをタップ/クリックすると教科名+数値バルーンを表示。
 * 何もタップしていない状態では数値非表示。
 */
// [render] openAnZoom
function openAnZoom(datasets, labels, colors, subjKeys) {
  var prev = document.getElementById('an-zoom-overlay'); if (prev) prev.remove();

  var ov = document.createElement('div');
  ov.id = 'an-zoom-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1100;'
    + 'display:flex;align-items:center;justify-content:center;padding:16px';

  var box = document.createElement('div');
  box.style.cssText = 'background:var(--card);border-radius:14px;padding:16px 16px 12px;'
    + 'width:100%;max-width:600px;border-top:2px solid var(--ac)';

  var ttl = document.createElement('div');
  ttl.style.cssText = 'font-size:13px;font-weight:800;color:var(--ac2);margin-bottom:10px';
  ttl.textContent = curTType + ' 成績トレンド';

  var hint = document.createElement('div');
  hint.style.cssText = 'font-size:10px;color:var(--t3);text-align:center;margin-bottom:8px';
  hint.textContent = '点をタップすると数値を表示';

  var cv2 = document.createElement('canvas');
  cv2.style.cssText = 'width:100%;display:block;touch-action:none;cursor:pointer';
  cv2.height = 340;

  var closeBtn = document.createElement('button');
  closeBtn.className = 'btn bs';
  closeBtn.style.cssText = 'width:100%;justify-content:center;margin-top:12px';
  closeBtn.textContent = '閉じる';
  closeBtn.onclick = function(){ ov.remove(); };

  box.appendChild(ttl);
  box.appendChild(hint);
  box.appendChild(cv2);
  box.appendChild(closeBtn);
  ov.appendChild(box);
  ov.addEventListener('click', function(e){ if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);

  // Canvas描画（アクティブ点なしで初期描画）
  var activePt = null;
  var dpr2 = window.devicePixelRatio || 1;

  function render() {
    var W2 = cv2.offsetWidth || 560, H2 = 340;
    if (cv2.width !== W2 * dpr2 || cv2.height !== H2 * dpr2) {
      cv2.width = W2 * dpr2; cv2.height = H2 * dpr2;
      cv2.style.width = W2 + 'px'; cv2.style.height = H2 + 'px';
    }
    var ctx2 = cv2.getContext('2d'); ctx2.scale(dpr2, dpr2);
    drawLineChart(ctx2, W2, H2, datasets, labels, colors, subjKeys, false, activePt);
  }

  requestAnimationFrame(render);

  // ── タップ/クリックで最近傍ドットを選択 ─────────────────────────
  var DOT_R = 24; // タップ判定半径(px)

  function findNearestDot(clientX, clientY) {
    var rect = cv2.getBoundingClientRect();
    var W2 = cv2.offsetWidth || 560, H2 = 340;
    var n = labels.length;
    var legH = (subjKeys && subjKeys.length > 1) ? Math.min(subjKeys.length, 8) * 14 + 8 : 0;
    var pd = {t: 20, r: 14, b: 32, l: 38};
    var gW = W2 - pd.l - pd.r, gH = H2 - pd.t - pd.b - legH;

    var allVals = [];
    datasets.forEach(function(d){ d.forEach(function(v){ if (v != null) allVals.push(v); }); });
    if (!allVals.length) return null;
    var mn = Math.max(0, Math.min.apply(null, allVals) - 10);
    var mx = Math.min(100, Math.max.apply(null, allVals) + 10);
    if (mx - mn < 10) { mn = Math.max(0, mn - 5); mx = Math.min(100, mx + 5); }
    var rng = mx - mn || 1;

    var cx = clientX - rect.left, cy = clientY - rect.top;
    var best = null, bestD = DOT_R;

    datasets.forEach(function(data, di) {
      data.forEach(function(v, i) {
        if (v === null) return;
        var px = pd.l + (n === 1 ? gW / 2 : i / (n - 1) * gW);
        var py = pd.t + gH - ((v - mn) / rng * gH);
        var d = Math.sqrt((cx - px) * (cx - px) + (cy - py) * (cy - py));
        if (d < bestD) { bestD = d; best = {di: di, i: i}; }
      });
    });
    return best;
  }

  function onTap(clientX, clientY) {
    var pt = findNearestDot(clientX, clientY);
    if (pt && activePt && activePt.di === pt.di && activePt.i === pt.i) {
      // 同じ点をもう一度タップ → 非表示
      activePt = null;
    } else {
      activePt = pt;
    }
    // Canvasを再スケールしてから再描画
    var W2 = cv2.offsetWidth || 560, H2 = 340;
    cv2.width = W2 * dpr2; cv2.height = H2 * dpr2;
    cv2.style.width = W2 + 'px'; cv2.style.height = H2 + 'px';
    var ctx2 = cv2.getContext('2d'); ctx2.scale(dpr2, dpr2);
    drawLineChart(ctx2, W2, H2, datasets, labels, colors, subjKeys, false, activePt);
  }

  cv2.addEventListener('click', function(e) {
    onTap(e.clientX, e.clientY);
  });
  cv2.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (e.changedTouches.length) onTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }, {passive: false});
}

/**
 * 折れ線グラフ描画
 * showValues: true のとき各点に数値ラベルを表示（拡大モーダル用）
 * activePt:   {di, i} で指定した点を強調し数値バルーンを出す（タップ用）
 */
// [render] drawLineChart
function drawLineChart(ctx, W, H, datasets, labels, colors, names, showValues, activePt) {
  ctx.clearRect(0, 0, W, H);
  var n = labels.length; if (!n) return;
  var legH = (names && names.length > 1) ? Math.min(names.length, 8) * 14 + 8 : 0;
  var pd = {t: 20, r: 14, b: 32, l: 38};
  var gW = W - pd.l - pd.r;
  var gH = H - pd.t - pd.b - legH;
  if (gW <= 0 || gH <= 0) return;

  var allVals = [];
  datasets.forEach(function(d){ d.forEach(function(v){ if (v != null) allVals.push(v); }); });
  if (!allVals.length) return;
  var mn = Math.max(0, Math.min.apply(null, allVals) - 10);
  var mx = Math.min(100, Math.max.apply(null, allVals) + 10);
  if (mx - mn < 10) { mn = Math.max(0, mn - 5); mx = Math.min(100, mx + 5); }
  var rng = mx - mn || 1;

  function ptX(i) { return pd.l + (n === 1 ? gW / 2 : i / (n - 1) * gW); }
  function ptY(v) { return pd.t + gH - ((v - mn) / rng * gH); }

  // Grid lines + Y labels
  ctx.strokeStyle = '#cfe6f4'; ctx.lineWidth = 0.5;
  [0, 20, 40, 60, 80, 100].forEach(function(v) {
    if (v < mn || v > mx) return;
    var y = ptY(v);
    ctx.beginPath(); ctx.moveTo(pd.l, y); ctx.lineTo(W - pd.r, y); ctx.stroke();
    ctx.fillStyle = '#8aa4b4'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(v, pd.l - 3, y + 3);
  });

  // X labels
  labels.forEach(function(lb, i) {
    ctx.fillStyle = '#8aa4b4'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(lb, ptX(i), H - legH - 4);
  });

  // Lines + fill + dots
  datasets.forEach(function(data, di) {
    var color = colors[di] || CFG.DEFAULT_COLOR;

    // Line
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    var started = false;
    data.forEach(function(v, i) {
      if (v === null) { started = false; return; }
      if (!started) { ctx.moveTo(ptX(i), ptY(v)); started = true; }
      else ctx.lineTo(ptX(i), ptY(v));
    });
    ctx.stroke();

    // Gradient fill (1 dataset only)
    if (datasets.length === 1) {
      ctx.save();
      var grad = ctx.createLinearGradient(0, pd.t, 0, pd.t + gH);
      grad.addColorStop(0, color + '40'); grad.addColorStop(1, color + '05');
      ctx.beginPath();
      var pts = data.map(function(v, i){ return v != null ? {x: ptX(i), y: ptY(v)} : null; }).filter(Boolean);
      if (pts.length >= 2) {
        ctx.moveTo(pts[0].x, pd.t + gH);
        pts.forEach(function(p){ ctx.lineTo(p.x, p.y); });
        ctx.lineTo(pts[pts.length - 1].x, pd.t + gH);
        ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
      }
      ctx.restore();
    }

    // Dots
    data.forEach(function(v, i) {
      if (v === null) return;
      var x = ptX(i), y = ptY(v);
      var isActive = activePt && activePt.di === di && activePt.i === i;
      var r = isActive ? 6 : 4;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = isActive ? 2.5 : 1.5; ctx.stroke();

      // 数値ラベル（showValues=true か、この点がアクティブな場合）
      if (showValues || isActive) {
        var vc = v >= 80 ? '#3aaa72' : v >= 60 ? '#e09030' : '#d84848';
        ctx.fillStyle = vc; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(v + '%', x, y - 10);
      }
    });

    // Legend
    if (names && names.length > 1 && legH > 0) {
      var ly = H - legH + di * 14 + 7;
      if (ly < H) {
        ctx.fillStyle = color; ctx.fillRect(pd.l, ly - 4, 14, 8);
        ctx.fillStyle = '#4a6478'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(names[di].slice(0, 6), pd.l + 18, ly + 3);
      }
    }
  });

  // アクティブ点のバルーン（教科名 + 数値）
  if (activePt) {
    var di = activePt.di, ii = activePt.i;
    var v = datasets[di] && datasets[di][ii];
    if (v != null) {
      var x = ptX(ii), y = ptY(v);
      var label = (names && names[di] ? names[di] : '') + ' ' + v + '%';
      var bw = ctx.measureText(label).width + 16;
      var bh = 22, bx = Math.min(Math.max(x - bw / 2, pd.l), W - pd.r - bw), by = y - bh - 10;
      if (by < 4) by = y + 14;
      // バルーン背景
      ctx.save();
      ctx.fillStyle = 'rgba(28,42,54,0.88)';
      ctx.beginPath();
      var br = 6;
      ctx.moveTo(bx + br, by); ctx.lineTo(bx + bw - br, by);
      ctx.arcTo(bx + bw, by, bx + bw, by + br, br);
      ctx.lineTo(bx + bw, by + bh - br);
      ctx.arcTo(bx + bw, by + bh, bx + bw - br, by + bh, br);
      ctx.lineTo(bx + br, by + bh);
      ctx.arcTo(bx, by + bh, bx, by + bh - br, br);
      ctx.lineTo(bx, by + br);
      ctx.arcTo(bx, by, bx + br, by, br);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(label, bx + bw / 2, by + 15);
      ctx.restore();
    }
  }
}

// pBadge: Tier名・色を更新
// [render] pBadge
function pBadge(){
  var earned=new Set(S.earnedBadges);
  var dates=S.earnedDates||{};
  var tNames=['','Tier 1  第一歩','Tier 2  天界学園','Tier 3  ケツイを力に',
              'Tier 4  ゴリラ','Tier 5  THE ABSOLUTE IDOL','最高難易度'];
  var tColors=['','#8aa4b4','#3aaa72','#76c0ea','#e09030','#d84848','#d84848'];
  var nonGag=BADGE_DEFS.filter(function(b){return b.tier>0;});
  var allEarned=S.earnedBadges.length;
  var pct=BADGE_DEFS.length?Math.round(allEarned/BADGE_DEFS.length*100):0;
  var out='';
  out+='<div class="ph"><div style="display:flex;align-items:center;gap:8px">';
  out+='<button class="btn bs sm" onclick="go(\'grades\')" style="padding:5px 10px">← 成績</button>';
  out+='<div class="pt">実績</div></div>';
  out+='<div class="ps">'+allEarned+'/'+BADGE_DEFS.length+' 解除済</div></div>';
  out+='<div class="card"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">';
  out+='<span>達成率</span><b style="color:var(--ac2)">'+pct+'%</b></div>';
  out+='<div class="lb" style="height:10px"><div class="lbf" style="width:'+pct+'%;background:var(--ac)"></div></div></div>';
  for(var tier=1;tier<=6;tier++){
    var tb=BADGE_DEFS.filter(function(b){return b.tier===tier;});
    if(!tb.length)continue;
    var ec=tb.filter(function(b){return earned.has(b.id);}).length;
    out+='<div style="font-size:10px;font-weight:700;color:'+tColors[tier]
      +';margin:14px 0 8px;letter-spacing:.8px">'+tNames[tier]+' ('+ec+'/'+tb.length+')</div>';
    out+='<div class="badge-grid">';
    tb.forEach(function(b){out+=makeBadgeCard(b,earned,dates,false);});
    out+='</div>';
  }
  var gag=BADGE_DEFS.filter(function(b){return b.tier===0;});
  if(gag.length){
    var eg=gag.filter(function(b){return earned.has(b.id);}).length;
    out+='<div style="font-size:10px;font-weight:700;color:#8aa4b4;margin:14px 0 8px;letter-spacing:.8px">'
      +'ネタ実績 ('+eg+'/'+gag.length+')</div>';
    out+='<div class="badge-grid">';
    gag.forEach(function(b){out+=makeBadgeCard(b,earned,dates,true);});
    out+='</div>';
  }
  return out;
}

// [render] makeBadgeCard: バッジカードのHTML文字列を返す（副作用なし）
function makeBadgeCard(b, earned, dates, isGag) {
  const e      = earned.has(b.id);
  const border = isGag ? 'border-style:dashed' : '';
  const dateH  = e && dates[b.id]
    ? `<div style="font-size:9px;color:var(--t3);margin-top:3px">${dates[b.id]}</div>`
    : '';
  const hintH = e
    ? (b.hint ? `<div style="font-size:9px;color:var(--ac2);line-height:1.4;margin-top:2px">${b.hint}</div>` : '')
    : (!isGag && b.hint
        ? `<div style="font-size:9px;color:var(--t3);line-height:1.4;margin-top:2px">💡 ${b.hint}</div>`
        : `<div style="font-size:9px;color:var(--t3);line-height:1.4;margin-top:2px">???</div>`);

  return `<div class="badge-card ${e ? 'earned' : ''}" onclick="showAchDetail(this)"
    data-bid="${b.id}" style="cursor:pointer;${border}">
    <span class="badge-icon" style="font-size:22px">${e ? b.icon : '?'}</span>
    <div style="font-size:11px;font-weight:700;margin-bottom:2px">${e ? b.name : '???'}</div>
    ${hintH}${dateH}
  </div>`;
}

// showAchDetail: hintを表示
// [render] showAchDetail
function showAchDetail(el){
  var id=el.getAttribute('data-bid');
  var b=BADGE_DEFS.find(function(x){return x.id===id;});
  if(!b)return;
  var isEarned=S.earnedBadges.includes(id);
  var dates=S.earnedDates||{};
  var tierNames=['ネタ','Tier 1 第一歩','Tier 2 天界学園','Tier 3 ケツイを力に',
                 'Tier 4 ゴリラ','Tier 5 THE ABSOLUTE IDOL','最高難易度'];
  var prev=document.getElementById('ach-detail-overlay');if(prev)prev.remove();
  var overlay=document.createElement('div');
  overlay.id='ach-detail-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;'
    +'display:flex;align-items:flex-end;justify-content:center';
  var box=document.createElement('div');
  box.style.cssText='background:var(--card);border-radius:14px 14px 0 0;padding:24px 20px;'
    +'width:100%;max-width:480px;padding-bottom:calc(20px + var(--sb));border-top:2px solid var(--ac)';
  var center=document.createElement('div');
  center.style.textAlign='center';
  var iconEl=document.createElement('div');
  iconEl.style.cssText='font-size:40px;margin-bottom:8px';
  iconEl.textContent=isEarned?b.icon:'?';
  var nameEl=document.createElement('div');
  nameEl.style.cssText='font-size:18px;font-weight:800;margin-bottom:4px';
  nameEl.textContent=isEarned?b.name:'???';
  var tierEl=document.createElement('div');
  tierEl.style.cssText='font-size:11px;color:var(--t3);margin-bottom:12px';
  tierEl.textContent=tierNames[b.tier]||'';
  var descEl=document.createElement('div');
  if(isEarned){
    descEl.style.cssText='font-size:13px;color:var(--t2);line-height:1.7;text-align:left;'
      +'background:var(--acbg);border-radius:10px;padding:12px 14px';
    descEl.textContent=b.hint?'達成条件: '+b.hint:'（達成条件は秘密）';
  } else {
    descEl.style.cssText='font-size:13px;color:var(--t3)';
    descEl.textContent=(b.tier===0)?'???':(b.hint?'達成条件: '+b.hint:'条件を満たすと解除されます');
  }
  center.appendChild(iconEl);center.appendChild(nameEl);

function checkBadges(){
  var newBadge=false;
  S.earnedDates=S.earnedDates||{};
  BADGE_DEFS.forEach(function(b){
    if(!S.earnedBadges.includes(b.id)&&b.check()){
      S.earnedBadges.push(b.id);
      S.earnedDates[b.id]=new Date().toISOString().slice(0,10);
      newBadge=true;
      setTimeout(function(){toast('実績解除「'+b.name+'」');},500);
    }
  });
  if(newBadge)saveS();
}

// §16b AUTO UPDATE CHECK ────────────────────
// 起動時にサーバー上のHTMLを取得し APP_VERSION を比較。
// 新バージョンがあればバナーを表示してリロードを促す。
// [event] checkForUpdate
function checkForUpdate(){
  // スタンドアロン（ホーム画面）またはオンライン時のみ実行
  if(!navigator.onLine)return;
  var url=location.href.split('?')[0]; // キャッシュバスター付き
  var bustUrl=url+(url.indexOf('?')>=0?'&':'?')+'_cb='+Date.now();
  fetch(bustUrl,{cache:'no-store',headers:{'pragma':'no-cache','cache-control':'no-cache'}})
    .then(function(r){return r.text();})
    .then(function(html){
      var m=html.match(/APP_VERSION='([^']+)'/);
      if(!m)return;
      var remoteVer=m[1];
      if(remoteVer!==APP_VERSION){
        showUpdateBanner(remoteVer);
      }
    })
    .catch(function(){/* ネットワークエラーは無視 */});
}

// [event] loadBg
function loadBg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=function(){const MAX=1200;let w=img.width,h=img.height;if(w>MAX||h>MAX){const sc=Math.min(MAX/w,MAX/h);w=Math.round(w*sc);h=Math.round(h*sc);}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);const compressed=cv.toDataURL('image/jpeg',0.72);S.settings=S.settings||{};S.settings.bg=compressed;applyBg(compressed);saveS();const kb=Math.round(compressed.length*0.75/1024);toast('背景を設定 ('+kb+'KB)');go('cfg');};img.src=ev.target.result;};r.readAsDataURL(f);}
// [event] clearBg
function clearBg() {

  S.settings.bg = '';
  applyBg('');
  saveS();
  toast('背景を解除');

// [render] applyBg
function applyBg(u) {
  const el = document.getElementById('bgimg');
  if (u) {
    el.style.backgroundImage = `url('${u}')`;
    el.style.display = 'block';
  } else {
    el.style.backgroundImage = '';
    el.style.display = 'none';
  }
}
// [pure] sanitizeStr
function sanitizeStr(s) {
  return String(s ?? '')
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g, '&quot;');
}
// [event] exportD
function exportD() {
  const b = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'stratonote_' + today() + '.json';
  a.click();
  toast('エクスポート完了');
}
// [event] importD
function importD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const parsed=JSON.parse(ev.target.result);if(typeof parsed!=='object'||Array.isArray(parsed)){toast('エラー：データ形式が不正です');return;}['events','sessions','decks','rounds','subjects','earnedBadges'].forEach(k=>{if(parsed[k]!==undefined&&!Array.isArray(parsed[k]))delete parsed[k];});if(Array.isArray(parsed.events)){parsed.events=parsed.events.map(ev=>({...ev,title:sanitizeStr(ev.title||''),subj:sanitizeStr(ev.subj||'')}));}if(Array.isArray(parsed.decks)){parsed.decks=parsed.decks.map(function(dk){return Object.assign({},dk,{name:sanitizeStr(dk.name||''),cards:Array.isArray(dk.cards)?dk.cards.map(function(c){return Object.assign({},c,{q:sanitizeStr(c.q||''),a:sanitizeStr(c.a||'')});}):[]}); });}if(Array.isArray(parsed.rounds)){parsed.rounds=parsed.rounds.map(function(r){return Object.assign({},r,{name:sanitizeStr(r.name||'')});});}S=Object.assign({},S,parsed);DSUBJ.forEach(s=>{if(!S.skills[s])S.skills[s]=[];});(S.subjects||[]).forEach(s=>{if(!S.skills[s])S.skills[s]=[];});S.earnedBadges=S.earnedBadges||[];S.earnedDates=S.earnedDates||{};saveS();toast('インポート完了');go('home');}catch{toast('エラー：ファイルが無効です');}};r.readAsText(f);}
